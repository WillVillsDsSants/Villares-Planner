function useTheme() {
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem('ops_theme') || 'dark'; } catch { return 'dark'; }
  });
  useEffect(() => {
    document.documentElement.classList.remove('light', 'dark');
    document.documentElement.classList.add(theme);
    try { localStorage.setItem('ops_theme', theme); } catch {}
  }, [theme]);
  return [theme, () => setTheme(t => t === 'dark' ? 'light' : 'dark')];
}

// ────────────────────────────────────────────────────────────────────────────
// DONUT SVG
// ────────────────────────────────────────────────────────────────────────────
function Donut({ pct, size, stroke }) {
  const [drawn, setDrawn] = useState(0);
  useEffect(() => {
    const t = setTimeout(() => setDrawn(pct), 80);
    return () => clearTimeout(t);
  }, [pct]);
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const off = c - (drawn / 100) * c;
  const color = drawn >= 70 ? 'var(--color-positive)'
              : drawn >= 40 ? 'var(--color-warning)'
              : drawn > 0   ? 'var(--color-negative)'
              : 'var(--color-text-quaternary)';
  return (
    <svg width={size} height={size} style={{ transform: 'rotate(-90deg)', display: 'block' }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none"
              stroke="var(--color-bg-surface-3)" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none"
              stroke={color} strokeWidth={stroke}
              strokeDasharray={c} strokeDashoffset={off}
              style={{ transition: 'stroke-dashoffset 1.2s cubic-bezier(0.16, 1, 0.3, 1), stroke 250ms' }}/>
    </svg>
  );
}

    const close = (e) => { if (!e.target.closest('.notif-panel') && !e.target.closest('.topbar__btn--bell')) setNotifOpen(false); };

  return (

    const onClick = (e) => { if (!e.target.closest('.dropdown')) setOpenMenu(null); };
    const onKey = (e) => { if (e.key === 'Escape') setOpenMenu(null); };
    const t = setTimeout(() => {
      document.addEventListener('click', onClick);
      document.addEventListener('keydown', onKey);
    }, 0);
    return () => {
      clearTimeout(t);
      document.removeEventListener('click', onClick);
      document.removeEventListener('keydown', onKey);
    };
  }, [openMenu]);

  const toggle = (m) => setOpenMenu(prev => prev === m ? null : m);
  const sortLabel = (SORT_OPTIONS.find(o => o.key === sortBy) || SORT_OPTIONS[0]).label;

  return (
    <div className="toolbar">
      <ToolbarDropdown icon={SortIcon} label="Ordenar" value={sortLabel}
                       open={openMenu === 'sort'} onToggle={() => toggle('sort')}>
        {SORT_OPTIONS.map(o => (
          <button key={String(o.key)}
                  className={`dropdown__item ${sortBy === o.key ? 'dropdown__item--active' : ''}`}
                  onClick={() => { onSortSelect(o.key); setOpenMenu(null); }}>
            {o.label}
            {sortBy === o.key && <span className="dropdown__check">■</span>}
          </button>
        ))}
      </ToolbarDropdown>

      <ToolbarDropdown icon={FilterIcon} label="Prioridade" value={prio}
                       open={openMenu === 'prio'} onToggle={() => toggle('prio')}>
        {['Todas', 'Crítica', 'Alta', 'Média', 'Baixa'].map(p => (
          <button key={p}
                  className={`dropdown__item ${prio === p ? 'dropdown__item--active' : ''}`}
                  onClick={() => { onPrio(p); setOpenMenu(null); }}>
            {p}
            {prio === p && <span className="dropdown__check">■</span>}
          </button>
        ))}
      </ToolbarDropdown>

      <ToolbarDropdown icon={Layers} label="Categoria" value={cat}
                       open={openMenu === 'cat'} onToggle={() => toggle('cat')}>
        {['Todas', ...D.CATEGORIAS].map(c => (
          <button key={c}
                  className={`dropdown__item ${cat === c ? 'dropdown__item--active' : ''}`}
                  onClick={() => { onCat(c); setOpenMenu(null); }}>
            {c}
            {cat === c && <span className="dropdown__check">■</span>}
          </button>
        ))}
      </ToolbarDropdown>

      <button className="toolbar__select" onClick={onToggleDensity}
              title={density === 'compacta' ? 'Mudar para lista detalhada' : 'Mudar para lista compacta'}>
        <Layers size={13}/>
        <span>{density === 'compacta' ? 'Compacta' : 'Detalhada'}</span>
      </button>
      <span className="toolbar__count">{count} {count === 1 ? 'Item' : 'Itens'}</span>
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// LIST ROW
// ────────────────────────────────────────────────────────────────────────────
function statusKey(status) {
  return {
    'Pendente': 'pendente', 'Recebido': 'pendente',
    'Em Andamento': 'andamento',
    'Pausado': 'pausado',
    'Concluído': 'concluido',
    'Bloqueado': 'bloqueado',
    'Cancelado': 'pendente', 'Recusado': 'pendente',
  }[status] || 'pendente';
}

function RowDesc({ text }) {
  const [expanded, setExpanded] = useState(false);
  const long = text.length > 140 || text.split('\n').length > 2;
  return (
    <div className="list-row__desc-wrap">
      <div className={`list-row__desc ${expanded ? 'list-row__desc--expanded' : ''}`}>{text}</div>
      {long && (
        <button className="list-row__desc-toggle"
                onClick={(e) => { e.stopPropagation(); setExpanded(v => !v); }}>
          {expanded ? 'Ver menos' : 'Ver mais'}
        </button>
      )}
    </div>
  );
}

function ListRow({ item, occDate, menuOpen, onMenuToggle, onEdit, onToggleComplete, onDuplicate, onDelete }) {
  const origemClass = item.origem === 'Projeto' ? 'projeto'
                    : item.origem === 'Rotina'  ? 'rotina' : 'pedido';
  const origemLetter = item.origem === 'Projeto' ? 'PJ'
                     : item.origem === 'Rotina'  ? 'RT' : 'PD';

  // — Coluna "Recebido em" (data de criação) —
  const criadoEm = item.criadoEm || item.recebidoEm;
  const criadoDate = criadoEm
    ? D.parseLocalDate(criadoEm).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }).replace('.', '')
    : null;
  const criadoDias = criadoEm ? D.diasAteHoje(criadoEm) : null;
  const criadoSub = criadoDias === null ? null
    : criadoDias === 0 ? 'Hoje'
    : criadoDias === -1 ? 'Ontem'
    : criadoDias < 0 ? `há ${Math.abs(criadoDias)} dias`
    : `em ${criadoDias} dias`;

  // — Coluna "Prazo" —
  const isLate = D.isAtrasado(item);
  const isToday = D.isHoje(item);
  const prazoDate = item.prazo
    ? new Date(item.prazo).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }).replace('.', '')
    : null;
  const prazoDias = item.prazo ? D.diasAteHoje(item.prazo) : null;
  const prazoSub = prazoDias === null ? null
    : prazoDias === 0 ? 'Hoje'
    : prazoDias === 1 ? 'Amanhã'
    : prazoDias < 0 ? `${Math.abs(prazoDias)} dias atrás`
    : `em ${prazoDias} dias`;
  const prazoPrimaryCls = isLate ? 'date-cell__primary--late'
                        : isToday ? 'date-cell__primary--today' : '';
  const prazoSubCls = isLate ? 'date-cell__sub--late' : '';

  // Para rotinas recorrentes, o estado exibido é o da DATA da ocorrência
  const dia = occDate || new Date();
  const recorrente = D.temDias(item);
  const programada = recorrente ? D.rotinaNoDia(item, dia) : true;
  const feitaNoDia = recorrente ? D.rotinaFeitaNoDia(item, dia) : D.isFeito(item);
  const ehHoje = D.diasAteHoje(dia) === 0;
  const statusK = recorrente
    ? (feitaNoDia ? 'feito' : programada ? 'aberto' : 'pausado')
    : statusKey(item.status);
  const isFeito = feitaNoDia;

  return (
    <div className={`list-row fade-up ${menuOpen ? 'list-row--menu-open' : ''}`}>
      <div className={`list-row__origem list-row__origem--${origemClass}`}>{origemLetter}</div>

      <div className="list-row__main">
        <div className="list-row__title">
          {item.hora && <span className="list-row__hora">{item.hora}<span className="list-row__hora-sep">|</span></span>}
          {item.titulo}
        </div>
        {item.descricao && <RowDesc text={item.descricao}/>}
        <div className="list-row__sub">
          <span>{item.origem}</span>
          {item.solicitante && (
            <>
              <span className="list-row__sub-dot"/>
              <span>de {item.solicitante}</span>
            </>
          )}
          {D.temDias(item) ? (
            <>
              <span className="list-row__sub-dot"/>
              <span>{item.dias}</span>
            </>
          ) : item.frequencia && (
            <>
              <span className="list-row__sub-dot"/>
              <span>{item.frequencia}</span>
            </>
          )}
        </div>
      </div>

      <div className="tag-cat" title={item.categoria}>{item.categoria}</div>

      <div>
        {item.prioridade === 'Crítica' && <span className="tag-prio tag-prio--critica">Crítica</span>}
        {item.prioridade === 'Alta' && <span className="tag-prio tag-prio--alta">Alta</span>}
        {item.prioridade === 'Média' && <span className="tag-prio tag-prio--media">Média</span>}
        {item.prioridade === 'Baixa' && <span className="tag-prio">Baixa</span>}
      </div>

      <div className="date-cell">
        {criadoDate ? (
          <>
            <span className="date-cell__primary">{criadoDate}</span>
            <span className="date-cell__sub">{criadoSub}</span>
          </>
        ) : (
          <span className="date-cell__none">—</span>
        )}
      </div>

      <div className="date-cell">
        {prazoDate ? (
          <>
            <span className={`date-cell__primary ${prazoPrimaryCls}`}>{prazoDate}</span>
            <span className={`date-cell__sub ${prazoSubCls}`}>{prazoSub}</span>
          </>
        ) : (
          <span className="date-cell__none">Sem prazo</span>
        )}
      </div>

      <div>
        <div className={`status status--${statusK}`}>
          <span className="status__dot"/>
          <span>{recorrente
            ? (feitaNoDia ? 'Concluído' : programada ? 'Pendente' : 'Não programada')
            : item.status}</span>
        </div>
      </div>

      <div className="dropdown">
        <button className="list-row__action" title="Mais ações"
                onClick={(e) => { e.stopPropagation(); onMenuToggle(item.id); }}>
          <More size={14}/>
        </button>
        {menuOpen && (
          <div className="dropdown__menu" onClick={(e) => e.stopPropagation()}>
            <button className="dropdown__item" onClick={() => { onEdit(item); onMenuToggle(null); }}>
              <Edit size={14}/> Editar
            </button>
            {(!recorrente || programada || feitaNoDia) && (
            <button className="dropdown__item" onClick={() => { onToggleComplete(item, dia); onMenuToggle(null); }}>
              {recorrente
                ? (feitaNoDia
                    ? <><Undo size={14}/> Reabrir {ehHoje ? 'hoje' : `(${D.DIAS_SEMANA[dia.getDay()]} ${String(dia.getDate()).padStart(2, '0')}/${String(dia.getMonth() + 1).padStart(2, '0')})`}</>
                    : <><CheckDouble size={14}/> Concluir {ehHoje ? 'hoje' : `(${D.DIAS_SEMANA[dia.getDay()]} ${String(dia.getDate()).padStart(2, '0')}/${String(dia.getMonth() + 1).padStart(2, '0')})`}</>)
                : (isFeito ? <><Undo size={14}/> Reabrir</> : <><CheckDouble size={14}/> Marcar Concluído</>)}
            </button>
            )}
            <button className="dropdown__item" onClick={() => { onDuplicate(item); onMenuToggle(null); }}>
              <Copy size={14}/> Duplicar
            </button>
            <div className="dropdown__divider"/>
            <button className="dropdown__item dropdown__item--danger" onClick={() => { onDelete(item); onMenuToggle(null); }}>
              <Trash size={14}/> Excluir
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// Ícone seta pra sort
const SortArrow = (p) => <Icon {...p}><path d="M12 5v14M5 12l7 7 7-7"/></Icon>;

function ListHeader({ sortBy, sortDir, onSort }) {
  const cell = (key, label) => {
    const active = sortBy === key;
    const cls = `list-header__cell ${active ? 'list-header__cell--active' : ''} ${active && sortDir === 'desc' ? 'list-header__cell--desc' : ''}`;
    return (
      <button className={cls} onClick={() => onSort(key)}>
        {label}
        <SortArrow size={11} className="list-header__cell-icon"/>
      </button>
    );
  };
  return (
    <div className="list-header">
      <div/>
      {cell('titulo', 'Item')}
      {cell('categoria', 'Categoria')}
      {cell('prioridade', 'Prioridade')}
      {cell('criadoEm', 'Recebido em')}
      {cell('prazo', 'Prazo')}
      {cell('status', 'Status')}
      <div/>
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// ASIDE: Próximos vencimentos + Categorias
// ────────────────────────────────────────────────────────────────────────────
function UpcomingPanel({ items }) {
  return (
    <div className="aside-panel">
      <div className="aside-panel__title">
        <Cal size={11}/>
        Próximos vencimentos
        <span className="aside-panel__title-meta">Próximos 7 dias</span>
      </div>
      {items.length === 0 ? (
        <div style={{ padding: '20px 0', textAlign: 'center', color: 'var(--color-text-tertiary)', fontFamily: 'var(--font-mono)', fontSize: 11 }}>
          Sem vencimentos próximos
        </div>
      ) : (
        <div className="upcoming">
          {items.map(item => {
            const dias = D.diasAteHoje(item.prazo);
            const isLate = dias < 0;
            const isToday = dias === 0;
            const cls = isLate ? 'upcoming-row__date--late' : isToday ? 'upcoming-row__date--today' : '';
            const lbl = isLate ? `${Math.abs(dias)}d atrás`
                      : isToday ? 'Hoje'
                      : dias === 1 ? 'Amanhã'
                      : `Em ${dias}d`;
            const origemCls = item.origem === 'Projeto' ? 'projeto'
                            : item.origem === 'Rotina'  ? 'rotina' : 'pedido';
            return (
              <div key={item.id} className="upcoming-row">
                <div className={`upcoming-row__date ${cls}`}>{lbl}</div>
                <div style={{ minWidth: 0 }}>
                  <div className="upcoming-row__title">{item.titulo}</div>
                  <div className="upcoming-row__cat">{item.categoria}</div>
                </div>
                <div className={`upcoming-row__origem upcoming-row__origem--${origemCls}`}>
                  {item.origem}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function CategoriesPanel({ data }) {
  return (
    <div className="aside-panel">
      <div className="aside-panel__title">
        <Layers size={11}/>
        Progresso por categoria
        <span className="aside-panel__title-meta">{data.length} Ativas</span>
      </div>
      {data.length === 0 ? (
        <div style={{ padding: '20px 0', textAlign: 'center', color: 'var(--color-text-tertiary)', fontFamily: 'var(--font-mono)', fontSize: 11 }}>
          Sem dados disponíveis
        </div>
      ) : (
        <div className="cat-list">
          {data.slice(0, 6).map(row => {
            const variant = row.pct >= 70 ? 'positive'
                          : row.pct >= 40 ? 'warning'
                          : row.pct > 0   ? 'negative' : '';
            return (
              <div key={row.nome}>
                <div className="cat-row__head">
                  <div>
                    <span className="cat-row__name">{row.nome}</span>
                    <span className="cat-row__ratio">{row.feitos}/{row.total}</span>
                  </div>
                  <span className="cat-row__pct">{Math.round(row.pct)}%</span>
                </div>
                <div className="bar">
                  <div className={`bar__fill ${variant ? 'bar__fill--' + variant : ''}`}
                       style={{ width: `${row.pct}%` }}/>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// ITEM MODAL — criar/editar item
// ────────────────────────────────────────────────────────────────────────────
function ItemModal({ open, item, onClose, onSave }) {
  const isEdit = !!item;
  const todayISO = new Date().toISOString().slice(0, 10);

  const [origem, setOrigem] = useState('Projeto');
  const [titulo, setTitulo] = useState('');
  const [descricao, setDescricao] = useState('');
  const [categorias, setCategorias] = useState([D.CATEGORIAS[0]]);
  const [prioridade, setPrioridade] = useState('Média');
  const [status, setStatus] = useState('Pendente');
  const [prazo, setPrazo] = useState('');
  const [hora, setHora] = useState('');
  const [solicitante, setSolicitante] = useState('');
  const [frequencia, setFrequencia] = useState('Diária');
  const [dias, setDias] = useState(['Seg', 'Ter', 'Qua', 'Qui', 'Sex']);
  const [error, setError] = useState('');

  // Reset state quando abre / muda item
  useEffect(() => {
    if (!open) return;
    setOrigem(item?.origem || 'Projeto');
    setTitulo(item?.titulo || '');
    setDescricao(item?.descricao || '');
    const cats = D.splitCats(item?.categoria);
    setCategorias(cats.length > 0 ? cats : [D.CATEGORIAS[0]]);
    setPrioridade(item?.prioridade || 'Média');
    setStatus(item?.status || (item?.origem === 'Pedido' ? 'Recebido' : 'Pendente'));
    setPrazo(item?.prazo ? String(item.prazo).slice(0, 10) : '');
    setHora(item?.hora || '');
    setSolicitante(item?.solicitante || '');
    setFrequencia(item?.frequencia || 'Diária');
    const d = D.splitDias(item?.dias);
    setDias(d.length > 0 ? d : ['Seg', 'Ter', 'Qua', 'Qui', 'Sex']);
    setError('');
  }, [open, item]);

  // Quando muda origem, ajusta status default e limpa campos específicos
  useEffect(() => {
    if (!open || isEdit) return;
    if (origem === 'Pedido') setStatus('Recebido');
    else if (origem === 'Rotina') setStatus('Pendente');
    else setStatus('Pendente');
  }, [origem, open, isEdit]);

  // ESC fecha
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open, onClose]);

  if (!open) return null;

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!titulo.trim()) {
      setError('O título é obrigatório');
      return;
    }
    if (categorias.length === 0) {
      setError('Selecione ao menos uma categoria');
      return;
    }
    if (origem === 'Rotina' && dias.length === 0) {
      setError('Selecione ao menos um dia da semana para a rotina');
      return;
    }
    const data = {
      origem,
      titulo: titulo.trim(),
      descricao: descricao.trim() || undefined,
      categoria: categorias.join(', '),
      prioridade,
      status,
      criadoEm: item?.criadoEm || todayISO,
    };
    if (prazo) data.prazo = prazo;
    if (hora) data.hora = hora;
    if (origem === 'Rotina') data.dias = dias.join(', ');
    if (origem === 'Pedido') {
      if (solicitante.trim()) data.solicitante = solicitante.trim();
      data.recebidoEm = item?.recebidoEm || todayISO;
    }
    if (origem === 'Rotina' && item?.frequencia) {
      data.frequencia = frequencia; // preserva valor legado ao editar
    }
    if (origem === 'Projeto' && item?.progresso !== undefined) {
      data.progresso = item.progresso;
    }
    onSave(data);
  };

  const statusOpts = origem === 'Pedido'
    ? ['Recebido', 'Em Andamento', 'Concluído', 'Recusado']
    : origem === 'Rotina'
      ? ['Pendente', 'Concluído']
      : ['Pendente', 'Em Andamento', 'Pausado', 'Bloqueado', 'Concluído', 'Cancelado'];

  return (
    <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal modal--form">
        <header className="modal__header">
          <div className="modal__title">{isEdit ? 'Editar item' : 'Novo item'}</div>
          <button type="button" className="modal__close" onClick={onClose} title="Fechar">
            <X size={16}/>
          </button>
        </header>

        <form onSubmit={handleSubmit}>
          <div className="modal__body">
            {/* Origem */}
            <div className="form-section__title">Identificação</div>
            <div className="form-group">
              <label className="form-group__label">Origem</label>
              <div className="form-segmented">
                {['Projeto', 'Rotina', 'Pedido'].map(o => (
                  <button key={o} type="button"
                          className={`form-segmented__item ${origem === o ? 'form-segmented__item--active' : ''}`}
                          onClick={() => setOrigem(o)}>
                    {o}
                  </button>
                ))}
              </div>
            </div>

            {/* Título */}
            <div className="form-group">
              <label className="form-group__label">
                Título<span className="form-group__label-req">*</span>
              </label>
              <input type="text" className="form-input" value={titulo}
                     onChange={(e) => { setTitulo(e.target.value); setError(''); }}
                     placeholder="Ex: Revisar tabela de fretes regional Sul"
                     autoFocus/>
              {error && <div className="form-group__hint" style={{ color: 'var(--color-critical)' }}>{error}</div>}
            </div>

            {/* Descrição */}
            <div className="form-group">
              <label className="form-group__label">Descrição</label>
              <textarea className="form-textarea" value={descricao}
                        onChange={(e) => setDescricao(e.target.value)}
                        placeholder="Detalhes adicionais (opcional)"
                        rows={2}/>
            </div>

            <div className="form-section__title form-section__title--gap">Classificação</div>

            {/* Categorias (multi-seleção) */}
            <div className="form-group">
              <label className="form-group__label">
                Categorias <span style={{ color: 'var(--color-text-quaternary)', fontWeight: 400 }}>· Selecione uma ou mais</span>
              </label>
              <div className="form-chips">
                {D.CATEGORIAS.map(c => {
                  const active = categorias.includes(c);
                  return (
                    <button key={c} type="button"
                            className={`form-chip ${active ? 'form-chip--active' : ''}`}
                            onClick={() => setCategorias(prev =>
                              active ? prev.filter(x => x !== c) : [...prev, c]
                            )}>
                      <span className="form-chip__mark">{active ? '■' : '□'}</span>
                      {c}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Prioridade */}
            <div className="form-row">
              <div className="form-group">
                <label className="form-group__label">Prioridade</label>
                <div className="form-segmented">
                  {['Crítica', 'Alta', 'Média', 'Baixa'].map(p => (
                    <button key={p} type="button"
                            className={`form-segmented__item ${prioridade === p ? 'form-segmented__item--active' : ''}`}
                            onClick={() => setPrioridade(p)}>
                      {p}
                    </button>
                  ))}
                </div>
              </div>
            </div>

            <div className="form-section__title form-section__title--gap">Agendamento</div>

            {/* Status + Hora (opcional) */}
            <div className="form-row">
              <div className="form-group">
                <label className="form-group__label">Status</label>
                <select className="form-select" value={status}
                        onChange={(e) => setStatus(e.target.value)}>
                  {statusOpts.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-group__label">
                  Hora <span style={{ color: 'var(--color-text-quaternary)', fontWeight: 400 }}>· Opcional</span>
                </label>
                <input type="time" className="form-input" value={hora}
                       onChange={(e) => setHora(e.target.value)}/>
              </div>
            </div>

            {/* Rotina: dias da semana em que se repete */}
            {origem === 'Rotina' && (
              <div className="form-group">
                <label className="form-group__label">
                  Dias da semana <span style={{ color: 'var(--color-text-quaternary)', fontWeight: 400 }}>· A rotina reaparece automaticamente nesses dias</span>
                </label>
                <div className="day-chips">
                  {['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'].map(d => {
                    const active = dias.includes(d);
                    return (
                      <button key={d} type="button"
                              className={`day-chip ${active ? 'day-chip--active' : ''}`}
                              onClick={() => setDias(prev =>
                                active ? prev.filter(x => x !== d) : [...prev, d]
                              )}>
                        {d}
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Prazo com atalho de dia da semana */}
            {origem !== 'Rotina' && (
              <div className="form-group">
                <label className="form-group__label">
                  Prazo de entrega <span style={{ color: 'var(--color-text-quaternary)', fontWeight: 400 }}>· Ou escolha o dia abaixo</span>
                </label>
                <input type="date" className="form-input" value={prazo}
                       onChange={(e) => setPrazo(e.target.value)}/>
                <div className="day-chips" style={{ marginTop: 6 }}>
                  {['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'].map((d, i) => {
                    const targetDow = (i + 1) % 7; // Seg=1 ... Dom=0
                    const selDow = prazo ? new Date(prazo + 'T12:00:00').getDay() : null;
                    return (
                      <button key={d} type="button"
                              className={`day-chip ${selDow === targetDow ? 'day-chip--active' : ''}`}
                              title={`Próxima ${d === 'Sáb' || d === 'Dom' ? '' : ''}${d}`}
                              onClick={() => {
                                const t = new Date(); t.setHours(12, 0, 0, 0);
                                const diff = (targetDow - t.getDay() + 7) % 7 || 7;
                                t.setDate(t.getDate() + (D.DIAS_SEMANA[t.getDay()] === d ? 0 : diff));
                                setPrazo(t.toISOString().slice(0, 10));
                              }}>
                        {d}
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Campos específicos */}
            {origem === 'Pedido' && (
              <div className="form-group">
                <label className="form-group__label">Solicitante</label>
                <input type="text" className="form-input" value={solicitante}
                       onChange={(e) => setSolicitante(e.target.value)}
                       placeholder="Ex: Gestor, Cliente interno, Outra área"/>
              </div>
            )}
          </div>

          <footer className="modal__footer">
            <button type="button" className="btn" onClick={onClose}>Cancelar</button>
            <button type="submit" className="btn btn--primary">
              {isEdit ? 'Salvar alterações' : 'Adicionar item'}
            </button>
          </footer>
        </form>
      </div>
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// PAINEL DE NOTIFICAÇÕES — vencimentos, atrasados, rotinas pendentes
// ────────────────────────────────────────────────────────────────────────────
function buildNotifs(items) {
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const notifs = [];

  items.forEach(it => {
    // ── Atrasados ──
    if (!D.temDias(it) && D.isAtivo(it) && D.isAtrasado(it)) {
      const dias = Math.abs(D.diasAteHoje(it.prazo));
      notifs.push({
        id: 'late-' + it.id, type: 'late', prio: 0,
        titulo: it.titulo,
        sub: `Atrasado há ${dias} ${dias === 1 ? 'dia' : 'dias'}`,
        dotClass: 'notif-item__dot',
        subClass: 'notif-item__sub--critical',
        item: it,
      });
    }
    // ── Vence hoje ──
    else if (!D.temDias(it) && D.isAtivo(it) && D.isHoje(it)) {
      notifs.push({
        id: 'today-' + it.id, type: 'today', prio: 1,
        titulo: it.titulo,
        sub: 'Vence hoje' + (it.hora ? ` às ${it.hora}` : ''),
        dotClass: 'notif-item__dot--warn',
        subClass: 'notif-item__sub--warn',
        item: it,
      });
    }
    // ── Vence em 1–3 dias ──
    else if (!D.temDias(it) && D.isAtivo(it) && it.prazo) {
      const d = D.diasAteHoje(it.prazo);
      if (d > 0 && d <= 3) {
        notifs.push({
          id: 'soon-' + it.id, type: 'soon', prio: 2,
          titulo: it.titulo,
          sub: `Vence em ${d} ${d === 1 ? 'dia' : 'dias'} — ${D.formatDate(it.prazo)}`,
          dotClass: 'notif-item__dot--warn',
          subClass: '',
          item: it,
        });
      }
    }
    // ── Prioridade Crítica sem prazo ──
    if (!D.temDias(it) && D.isAtivo(it) && it.prioridade === 'Crítica' && !it.prazo) {
      notifs.push({
        id: 'critica-' + it.id, type: 'critica', prio: 3,
        titulo: it.titulo,
        sub: 'Crítica · sem prazo definido',
        dotClass: 'notif-item__dot--warn',
        subClass: '',
        item: it,
      });
    }
    // ── Rotina pendente de hoje ──
    if (D.temDias(it) && D.rotinaNoDia(it, hoje) && !D.rotinaFeitaHoje(it)) {
      notifs.push({
        id: 'rotina-' + it.id, type: 'rotina', prio: 4,
        titulo: it.titulo,
        sub: 'Rotina de hoje' + (it.hora ? ` · ${it.hora}` : ''),
        dotClass: 'notif-item__dot--info',
        subClass: '',
        item: it,
      });
    }
  });

  return notifs.sort((a, b) => a.prio - b.prio);
}

const NOTIF_GROUP_LABELS = {
  late:    '⚠ Atrasados',
  today:   '📅 Vencem hoje',
  soon:    '⏳ Próximos 3 dias',
  critica: '🔴 Críticos sem prazo',
  rotina:  '🔁 Rotinas de hoje',
};

function NotifPanel({ items, readIds, onMarkAll, onClose, onEditItem, dismissedIds, onDismiss }) {
  const notifs = useMemo(() => buildNotifs(items), [items]);
  const dismissed = dismissedIds || new Set();
  const visible = useMemo(() => notifs.filter(n => !dismissed.has(n.id)), [notifs, dismissed]);
  const unread = visible.filter(n => !readIds.has(n.id));

  const groups = useMemo(() => {
    const map = new Map();
    visible.forEach(n => {
      if (!map.has(n.type)) map.set(n.type, []);
      map.get(n.type).push(n);
    });
    return [...map.entries()].filter(([, list]) => list.length > 0);
  }, [visible]);

  return (
    <div className="notif-panel">
      <div className="notif-panel__head">
        <span className="notif-panel__title">
          <strong>Notificações</strong>
          {unread.length > 0 && `${unread.length} nova${unread.length > 1 ? 's' : ''}`}
        </span>
        {unread.length > 0 && (
          <button className="notif-panel__mark" onClick={onMarkAll}>Marcar todas lidas</button>
        )}
      </div>
      <div className="notif-panel__body">
        {notifs.length === 0 ? (
          <div className="notif-panel__empty">Nenhuma notificação.<br/>Tudo em dia ✓</div>
        ) : groups.map(([type, list]) => (
          <div key={type}>
            <div className="notif-group__label">{NOTIF_GROUP_LABELS[type]}</div>
            {list.map(n => (
              <div key={n.id}
                   className={`notif-item ${!readIds.has(n.id) ? 'notif-item--unread' : 'notif-item--seen'}`}
                   data-type={n.type}>
                <span className={`notif-item__dot ${n.dotClass}`}/>
                <button style={{ background:'transparent',border:'none',cursor:'pointer',textAlign:'left',padding:0,flex:1,minWidth:0,display:'flex',flexDirection:'column',gap:2 }}
                        onClick={() => { onEditItem(n.item); onClose(); }}>
                  <span className="notif-item__title">{n.titulo}</span>
                  <span className={`notif-item__sub ${n.subClass}`}>{n.sub}</span>
                </button>
                <button className="notif-item__dismiss"
                        title="Dispensar"
                        onClick={(e) => { e.stopPropagation(); onDismiss && onDismiss(n.id); }}>×</button>
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// OCORRÊNCIAS — tarefas com prazo no dia + rotinas recorrentes do dia da semana
// ────────────────────────────────────────────────────────────────────────────
const sameDay = (a, b) =>
  a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();

const parseDia = (v) => D.parseLocalDate(v);

// Ocorrência concluída naquele dia específico?
const ocorrenciaFeita = (it, d) => {
  if (D.temDias(it)) return D.rotinaFeitaNoDia(it, d);
  return D.isFeito(it);
};

// Todas as ocorrências de uma data, ordenadas por hora (sem hora ao fim)
const occurrencesForDay = (items, d) => {
  const fixos = items.filter(it => it.prazo && sameDay(parseDia(it.prazo), d) && !D.temDias(it));
  const rotinas = items.filter(it => D.rotinaNoDia(it, d));
  return [...rotinas, ...fixos].sort((a, b) => {
    if (a.hora && b.hora) return a.hora.localeCompare(b.hora);
    if (a.hora) return -1;
    if (b.hora) return 1;
    return 0;
  });
};

// ────────────────────────────────────────────────────────────────────────────
// KANBAN — colunas por status com arrastar e soltar
// ────────────────────────────────────────────────────────────────────────────
const KANBAN_COLS = [
  { status: 'Pendente',     extra: ['Recebido'], mod: '' },
  { status: 'Em Andamento', extra: [],           mod: '' },
  { status: 'Pausado',      extra: [],           mod: '' },
  { status: 'Bloqueado',    extra: [],           mod: 'kanban__col--blocked' },
  { status: 'Concluído',    extra: [],           mod: 'kanban__col--done' },
];

function KanbanView({ items, onEdit, onSetStatus, onToggle }) {
  const [draggingId, setDraggingId] = useState(null);
  const [overCol, setOverCol] = useState(null);

  const colItems = (col) =>
    items.filter(it => {
      if (D.temDias(it)) {
        // Rotina recorrente no Kanban: coluna pelo estado de HOJE
        const alvo = D.rotinaFeitaHoje(it) ? 'Concluído' : 'Pendente';
        return col.status === alvo;
      }
      return it.status === col.status || col.extra.includes(it.status);
    });

  const handleDrop = (e, col) => {
    e.preventDefault();
    setOverCol(null);
    const id = e.dataTransfer.getData('text/plain') || draggingId;
    setDraggingId(null);
    const item = items.find(it => it.id === id);
    if (!item) return;
    if (D.temDias(item)) {
      // Rotina: arrastar para Concluído = concluir HOJE; sair de lá = reabrir HOJE
      const feitaHoje = D.rotinaFeitaHoje(item);
      if (col.status === 'Concluído' && !feitaHoje) onToggle(item);
      else if (col.status !== 'Concluído' && feitaHoje) onToggle(item);
      return;
    }
    onSetStatus(item, col.status);
  };

  return (
    <>
      <div className="view-head">
        <div className="view-head__title">Kanban</div>
        <div className="view-head__meta">Arraste os cards entre colunas para mudar o status</div>
      </div>
      <div className="kanban">
        {KANBAN_COLS.map(col => {
          const cards = colItems(col);
          return (
            <div key={col.status}
                 className={`kanban__col ${col.mod} ${overCol === col.status ? 'kanban__col--over' : ''}`}
                 onDragOver={(e) => { e.preventDefault(); setOverCol(col.status); }}
                 onDragLeave={(e) => { if (!e.currentTarget.contains(e.relatedTarget)) setOverCol(null); }}
                 onDrop={(e) => handleDrop(e, col)}>
              <div className="kanban__col-head">
                <div className="kanban__col-title">
                  <span className="kanban__col-dot"/>
                  {col.status}
                </div>
                <span className="kanban__col-count">{cards.length}</span>
              </div>
              <div className="kanban__cards">
                {cards.length === 0 ? (
                  <div className="kanban__empty">Solte aqui</div>
                ) : cards.map(it => (
                  <div key={it.id}
                       className={`kanban__card ${it.prioridade === 'Crítica' ? 'kanban__card--critica' : it.prioridade === 'Alta' ? 'kanban__card--alta' : it.prioridade === 'Média' ? 'kanban__card--media' : ''} ${draggingId === it.id ? 'kanban__card--dragging' : ''}`}
                       draggable
                       onDragStart={(e) => {
                         e.dataTransfer.setData('text/plain', it.id);
                         e.dataTransfer.effectAllowed = 'move';
                         setDraggingId(it.id);
                       }}
                       onDragEnd={() => { setDraggingId(null); setOverCol(null); }}
                       onDoubleClick={() => onEdit(it)}
                       title="Arraste para mover · Duplo clique para editar">
                    <div className="kanban__card-title">{it.titulo}</div>
                    <div className="kanban__card-meta">
                      <span>{it.origem}</span>
                      {it.prioridade && <span>· {it.prioridade}</span>}
                      {it.prazo && (
                        <span className={D.isAtrasado(it) ? 'late' : ''}>
                          · {D.formatRelative(it.prazo)}
                        </span>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </>
  );
}

// NOTAS — anotações rápidas, salvas localmente no navegador
// ────────────────────────────────────────────────────────────────────────────
function NotesView() {
  const [notas, setNotas] = useState(() => {
    try {
      const saved = localStorage.getItem('villares_planner_notas');
      if (saved) {
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed)) return parsed;
      }
    } catch {}
    return [];
  });

  useEffect(() => {
    try { localStorage.setItem('villares_planner_notas', JSON.stringify(notas)); } catch {}
  }, [notas]);

  const criar = () => {
    const nota = {
      id: 'N-' + Date.now().toString(36),
      titulo: '',
      texto: '',
      fixada: false,
      criadoEm: new Date().toISOString(),
    };
    setNotas(prev => [nota, ...prev]);
  };

  const atualizar = (id, patch) =>
    setNotas(prev => prev.map(n => n.id === id ? { ...n, ...patch } : n));

  const excluir = (nota) => {
    const vazia = !nota.titulo.trim() && !nota.texto.trim();
    if (!vazia && !window.confirm('Excluir esta nota? Esta ação não pode ser desfeita.')) return;
    setNotas(prev => prev.filter(n => n.id !== nota.id));
  };

  const ordenadas = useMemo(() =>
    [...notas].sort((a, b) =>
      (b.fixada ? 1 : 0) - (a.fixada ? 1 : 0) ||
      new Date(b.criadoEm) - new Date(a.criadoEm)
    )
  , [notas]);

  return (
    <>
      <div className="view-head">
        <div className="view-head__title">Notas</div>
        <div className="view-head__meta">
          {notas.length} {notas.length === 1 ? 'Nota' : 'Notas'} · Salvas localmente neste navegador
        </div>
      </div>
      <div className="notes-toolbar">
        <button className="topbar__cta" onClick={criar}>
          <Plus size={14}/> Nova nota
        </button>
      </div>
      {ordenadas.length === 0 ? (
        <div className="empty-view fade-up">
          Nenhuma nota ainda. Clique em "Nova nota" para registrar lembretes,<br/>
          ideias e pendências rápidas que não precisam virar um item do Planner.
        </div>
      ) : (
        <div className="notes-grid">
          {ordenadas.map(n => (
            <div key={n.id} className={`note fade-up ${n.fixada ? 'note--pinned' : ''}`}>
              <div className="note__bar">
                <span className="note__date">
                  {new Date(n.criadoEm).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }).replace('.', '')}
                </span>
                <button className={`note__btn ${n.fixada ? 'note__btn--on' : ''}`}
                        title={n.fixada ? 'Desafixar' : 'Fixar no topo'}
                        onClick={() => atualizar(n.id, { fixada: !n.fixada })}>
                  <Pin size={13}/>
                </button>
                <button className="note__btn note__btn--danger" title="Excluir nota"
                        onClick={() => excluir(n)}>
                  <Trash size={13}/>
                </button>
              </div>
              <input className="note__title" placeholder="Título"
                     value={n.titulo}
                     onChange={(e) => atualizar(n.id, { titulo: e.target.value })}/>
              <textarea className="note__text" placeholder="Escreva sua nota..."
                        value={n.texto}
                        onChange={(e) => atualizar(n.id, { texto: e.target.value })}/>
            </div>
          ))}
        </div>
      )}
    </>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// CALENDÁRIO — itens distribuídos por prazo
// ────────────────────────────────────────────────────────────────────────────
// ═══ CALENDÁRIO v2 — modos Agenda / Semana / Mês / Timeline + filtros reais ═══

const CAL_TIPOS    = ['Todas', 'Projetos', 'Rotinas', 'Pedidos'];
const CAL_STATUS   = ['Todos', 'Pendente', 'Em andamento', 'Concluído', 'Atrasado'];
const CAL_PRIOS    = ['Todas', 'Crítica', 'Alta', 'Média', 'Baixa'];
const CAL_PERIODOS = ['Todos', 'Hoje', 'Amanhã', 'Esta semana', 'Próxima semana', 'Este mês'];
const CAL_FILTROS_DEFAULT = { tipo: 'Todas', status: 'Todos', prio: 'Todas', cats: [], periodo: 'Todos' };

function inicioSemana(d) {
  const s = new Date(d); s.setHours(12, 0, 0, 0);
  s.setDate(s.getDate() - ((s.getDay() + 6) % 7)); // segunda
  return s;
}

function periodoRange(periodo) {
  const hoje = new Date(); hoje.setHours(12, 0, 0, 0);
  const mk = (a, b) => [a, b];
  switch (periodo) {
    case 'Hoje':           return mk(hoje, hoje);
    case 'Amanhã':         { const d = new Date(hoje); d.setDate(d.getDate() + 1); return mk(d, d); }
    case 'Esta semana':    { const i = inicioSemana(hoje); const f = new Date(i); f.setDate(i.getDate() + 6); return mk(i, f); }
    case 'Próxima semana': { const i = inicioSemana(hoje); i.setDate(i.getDate() + 7); const f = new Date(i); f.setDate(i.getDate() + 6); return mk(i, f); }
    case 'Este mês':       { const i = new Date(hoje.getFullYear(), hoje.getMonth(), 1, 12); const f = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0, 12); return mk(i, f); }
    default:               return null;
  }
}

function CalFilters({ filters, onChange }) {
  const [openMenu, setOpenMenu] = useState(null);

  useEffect(() => {
    if (!openMenu) return;
    const onClick = (e) => { if (!e.target.closest('.dropdown')) setOpenMenu(null); };
    const onKey = (e) => { if (e.key === 'Escape') setOpenMenu(null); };
    const t = setTimeout(() => {
      document.addEventListener('click', onClick);
      document.addEventListener('keydown', onKey);
    }, 0);
    return () => {
      clearTimeout(t);
      document.removeEventListener('click', onClick);
      document.removeEventListener('keydown', onKey);
    };
  }, [openMenu]);

  const toggle = (m) => setOpenMenu(prev => prev === m ? null : m);
  const set = (patch) => onChange({ ...filters, ...patch });
  const hasActive = filters.tipo !== 'Todas' || filters.status !== 'Todos' ||
                    filters.prio !== 'Todas' || filters.cats.length > 0 || filters.periodo !== 'Todos';

  const single = (menuKey, icon, label, value, options, patchKey, closeOnPick = true) => (
    <ToolbarDropdown icon={icon} label={label} value={value}
                     open={openMenu === menuKey} onToggle={() => toggle(menuKey)}>
      {options.map(o => (
        <button key={o}
                className={`dropdown__item ${value === o ? 'dropdown__item--active' : ''}`}
                onClick={() => { set({ [patchKey]: o }); if (closeOnPick) setOpenMenu(null); }}>
          {o}
          {value === o && <span className="dropdown__check">■</span>}
        </button>
      ))}
    </ToolbarDropdown>
  );

  return (
    <div className="cal-filterbar fade-up">
      {single('tipo',    Box,        'Tipo',       filters.tipo,    CAL_TIPOS,    'tipo')}
      {single('status',  Loader,     'Status',     filters.status,  CAL_STATUS,   'status')}
      {single('prio',    FilterIcon, 'Prioridade', filters.prio,    CAL_PRIOS,    'prio')}
      <ToolbarDropdown icon={Layers} label="Categoria"
                       value={filters.cats.length === 0 ? 'Todas' : `${filters.cats.length} selecionadas`}
                       open={openMenu === 'cats'} onToggle={() => toggle('cats')}>
        <button className={`dropdown__item ${filters.cats.length === 0 ? 'dropdown__item--active' : ''}`}
                onClick={() => set({ cats: [] })}>
          Todas
          {filters.cats.length === 0 && <span className="dropdown__check">■</span>}
        </button>
        {D.CATEGORIAS.map(c => {
          const on = filters.cats.includes(c);
          return (
            <button key={c}
                    className={`dropdown__item ${on ? 'dropdown__item--active' : ''}`}
                    onClick={() => set({ cats: on ? filters.cats.filter(x => x !== c) : [...filters.cats, c] })}>
              <span className="dropdown__check" style={{ marginLeft: 0, marginRight: 2 }}>{on ? '■' : '□'}</span>
              {c}
            </button>
          );
        })}
      </ToolbarDropdown>
      {single('periodo', Cal,        'Período',    filters.periodo, CAL_PERIODOS, 'periodo')}

      {hasActive && (
        <button className="cal-filterbar__clear" onClick={() => onChange({ ...CAL_FILTROS_DEFAULT })}>
          <X size={12}/> Limpar filtros
        </button>
      )}
      <span className="cal-filters__hint">A busca da barra superior também se aplica</span>
    </div>
  );
}

function CalendarView({ items, onEdit }) {
  const now = new Date();
  const [mode, setMode] = useState('mes'); // agenda | semana | mes | timeline
  const [ym, setYm] = useState({ y: now.getFullYear(), m: now.getMonth() });
  const [selected, setSelected] = useState(() => { const d = new Date(); d.setHours(12,0,0,0); return d; });
  const [filters, setFilters] = useState({ ...CAL_FILTROS_DEFAULT });

  const today = new Date(); today.setHours(12, 0, 0, 0);

  // ── filtro de ocorrência ──
  const range = periodoRange(filters.periodo);
  const dentroDoPeriodo = (d) => !range || (d >= new Date(range[0]).setHours(0,0,0,0) && d <= new Date(range[1]).setHours(23,59,59,999));

  const passaFiltros = (it, d) => {
    if (!dentroDoPeriodo(d)) return false;
    if (filters.tipo !== 'Todas') {
      const origem = { 'Projetos': 'Projeto', 'Rotinas': 'Rotina', 'Pedidos': 'Pedido' }[filters.tipo];
      if (it.origem !== origem) return false;
    }
    if (filters.prio !== 'Todas' && it.prioridade !== filters.prio) return false;
    if (filters.cats.length > 0 && !filters.cats.some(c => D.hasCat(it, c))) return false;
    if (filters.status !== 'Todos') {
      const feita = ocorrenciaFeita(it, d);
      switch (filters.status) {
        case 'Pendente':     if (feita || it.status === 'Em Andamento') return false; break;
        case 'Em andamento': if (it.status !== 'Em Andamento' || feita) return false; break;
        case 'Concluído':    if (!feita) return false; break;
        case 'Atrasado':     if (D.temDias(it) || !D.isAtrasado(it)) return false; break;
      }
    }
    return true;
  };

  const byDay = (d) => occurrencesForDay(items, d).filter(it => passaFiltros(it, d));

  // ── navegação ──
  const goTo = (date) => {
    const d = new Date(date); d.setHours(12, 0, 0, 0);
    setSelected(d);
    setYm({ y: d.getFullYear(), m: d.getMonth() });
  };
  const shiftDay = (delta) => { const d = new Date(selected); d.setDate(d.getDate() + delta); goTo(d); };
  const shiftMonth = (delta) => setYm(({ y, m }) => { const d = new Date(y, m + delta, 1); return { y: d.getFullYear(), m: d.getMonth() }; });

  // ── dados por modo ──
  const monthLabel = new Date(ym.y, ym.m, 1).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });

  const monthCells = useMemo(() => {
    const first = new Date(ym.y, ym.m, 1);
    const start = new Date(first);
    start.setDate(first.getDate() - ((first.getDay() + 6) % 7));
    return Array.from({ length: 42 }, (_, i) => {
      const d = new Date(start); d.setDate(start.getDate() + i); d.setHours(12, 0, 0, 0);
      return d;
    });
  }, [ym]);

  const weekDays = useMemo(() => {
    const start = inicioSemana(selected);
    return Array.from({ length: 7 }, (_, i) => {
      const d = new Date(start); d.setDate(start.getDate() + i);
      return d;
    });
  }, [selected]);

  const agendaDays = useMemo(() => {
    // Período define o intervalo; sem período: 14 dias a partir do selecionado
    let ini, fim;
    if (range) { ini = new Date(range[0]); fim = new Date(range[1]); }
    else { ini = new Date(selected); fim = new Date(selected); fim.setDate(fim.getDate() + 13); }
    const days = [];
    for (let d = new Date(ini); d <= fim; d.setDate(d.getDate() + 1)) {
      const day = new Date(d); day.setHours(12, 0, 0, 0);
      days.push({ date: day, evs: byDay(day) });
    }
    return days.filter(x => x.evs.length > 0);
  }, [items, selected, filters]);

  const fmtDia = (d) => d.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long' });
  const selEvents = byDay(selected);

  const renderRow = (it, d) => (
    <button key={it.id + d.toISOString().slice(0, 10)} className="day-panel__row" onClick={() => onEdit(it)}>
      <span className={`day-panel__hora ${!it.hora ? 'day-panel__hora--none' : ''}`}>{it.hora || '—:—'}</span>
      <span className={`day-panel__item-title ${ocorrenciaFeita(it, d) ? 'day-panel__item-title--done' : ''}`}>
        {it.titulo}
        {it.descricao && <span className="day-panel__desc"> — {String(it.descricao).split('\n')[0]}</span>}
      </span>
      <span className="day-panel__badges">
        {D.temDias(it) && <span className="day-panel__badge">Rotina</span>}
        {(it.prioridade === 'Crítica' || it.prioridade === 'Alta') && (
          <span className="day-panel__badge day-panel__badge--alta">{it.prioridade}</span>
        )}
      </span>
    </button>
  );

  return (
    <>
      <div className="view-head">
        <div className="view-head__title">Calendário</div>
        <div className="cal-modes">
          {[['agenda', 'Agenda'], ['semana', 'Semana'], ['mes', 'Mês'], ['timeline', 'Timeline']].map(([k, l]) => (
            <button key={k} className={`cal-mode ${mode === k ? 'cal-mode--active' : ''}`}
                    onClick={() => setMode(k)}>{l}</button>
          ))}
        </div>
      </div>

      <CalFilters filters={filters} onChange={setFilters}/>

      {/* Navegação rápida */}
      <div className="cal-nav fade-up">
        <div className="cal-nav__group">
          {mode === 'semana' ? (
            <>
              <button className="cal__nav-btn" onClick={() => shiftDay(-7)}>← Semana</button>
              <button className="cal__nav-btn cal__nav-btn--strong" onClick={() => goTo(new Date())}>Hoje</button>
              <button className="cal__nav-btn" onClick={() => shiftDay(7)}>Semana →</button>
            </>
          ) : (
            <>
              <button className="cal__nav-btn" onClick={() => shiftDay(-1)}>← Dia anterior</button>
              <button className="cal__nav-btn cal__nav-btn--strong" onClick={() => goTo(new Date())}>Hoje</button>
              <button className="cal__nav-btn" onClick={() => shiftDay(1)}>Próximo dia →</button>
            </>
          )}
        </div>
        <div className="cal-nav__group">
          <label className="cal-nav__label">Ir para:</label>
          <input type="date" className="form-input cal-nav__date"
                 value={D.localISO(selected)}
                 onChange={(e) => { if (e.target.value) goTo(new Date(e.target.value + 'T12:00:00')); }}/>
        </div>
      </div>

      {/* ══ MODO AGENDA ══ */}
      {mode === 'agenda' && (
        <div className="agenda fade-up">
          {agendaDays.length === 0 ? (
            <div className="day-panel__empty">Nenhum item no período selecionado.</div>
          ) : agendaDays.map(({ date, evs }) => (
            <div key={date.toISOString()} className="agenda__day">
              <div className={`agenda__day-head ${sameDay(date, today) ? 'agenda__day-head--today' : ''}`}>
                <span className="agenda__day-name">{sameDay(date, today) ? 'Hoje' : fmtDia(date)}</span>
                <span className="agenda__day-count">{evs.length} {evs.length === 1 ? 'Item' : 'Itens'}</span>
              </div>
              <div className="day-panel__list">{evs.map(it => renderRow(it, date))}</div>
            </div>
          ))}
        </div>
      )}

      {/* ══ MODO SEMANA ══ */}
      {mode === 'semana' && (
        <div className="week fade-up">
          {weekDays.map(d => {
            const evs = byDay(d);
            const isToday = sameDay(d, today);
            return (
              <div key={d.toISOString()} className={`week__col ${isToday ? 'week__col--today' : ''}`}>
                <div className="week__col-head">
                  <span className="week__col-dow">{D.DIAS_SEMANA[d.getDay()]}</span>
                  <span className="week__col-num">{d.getDate()}</span>
                </div>
                <div className="week__col-list">
                  {evs.length === 0 ? (
                    <div className="week__empty">—</div>
                  ) : evs.map(it => (
                    <button key={it.id + d.toISOString().slice(0,10)}
                            className={`cal__ev ${ocorrenciaFeita(it, d) ? 'cal__ev--done' : (!D.temDias(it) && D.isAtrasado(it)) ? 'cal__ev--late' : ''} ${D.temDias(it) ? 'cal__ev--rotina' : ''}`}
                            title={`${it.hora ? it.hora + ' · ' : ''}${it.titulo}${it.descricao ? ' — ' + it.descricao : ''}`}
                            onClick={() => onEdit(it)}>
                      {it.hora && <span className="cal__ev-hora">{it.hora}</span>}{it.titulo}
                    </button>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ══ MODO MÊS ══ */}
      {mode === 'mes' && (<>
        <div className="cal fade-up">
          <div className="cal__bar">
            <div className="cal__month">{monthLabel}</div>
            <div className="cal__nav">
              <button className="cal__nav-btn" onClick={() => shiftMonth(-1)}>← Mês</button>
              <button className="cal__nav-btn" onClick={() => shiftMonth(1)}>Mês →</button>
            </div>
          </div>
          <div className="cal__dows">
            {['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'].map(d => (
              <div key={d} className="cal__dow">{d}</div>
            ))}
          </div>
          <div className="cal__grid">
            {monthCells.map((d, i) => {
              const evs = byDay(d);
              const out = d.getMonth() !== ym.m;
              const isToday = sameDay(d, today);
              const isSel = sameDay(d, selected);
              return (
                <div key={i}
                     className={`cal__cell ${out ? 'cal__cell--out' : ''} ${isToday ? 'cal__cell--today' : ''} ${isSel ? 'cal__cell--selected' : ''}`}
                     onClick={() => setSelected(d)}>
                  <div className="cal__day">{d.getDate()}</div>
                  {evs.slice(0, 3).map(it => (
                    <button key={it.id + i}
                            className={`cal__ev ${ocorrenciaFeita(it, d) ? 'cal__ev--done' : (!D.temDias(it) && D.isAtrasado(it)) ? 'cal__ev--late' : ''} ${D.temDias(it) ? 'cal__ev--rotina' : ''}`}
                            title={`${it.hora ? it.hora + ' · ' : ''}${it.titulo}${it.descricao ? ' — ' + it.descricao : ''}`}
                            onClick={(e) => { e.stopPropagation(); onEdit(it); }}>
                      {it.hora && <span className="cal__ev-hora">{it.hora}</span>}{it.titulo}
                    </button>
                  ))}
                  {evs.length > 3 && <div className="cal__more">+{evs.length - 3} Itens</div>}
                </div>
              );
            })}
          </div>
        </div>

        <div className="day-panel fade-up">
          <div className="day-panel__head">
            <div className="day-panel__title">{sameDay(selected, today) ? 'Hoje' : fmtDia(selected)}</div>
            <div className="day-panel__meta">{selEvents.length} {selEvents.length === 1 ? 'Item' : 'Itens'}</div>
          </div>
          {selEvents.length === 0 ? (
            <div className="day-panel__empty">Nada agendado para este dia.</div>
          ) : (
            <div className="day-panel__list">{selEvents.map(it => renderRow(it, selected))}</div>
          )}
        </div>
      </>)}

      {/* ══ MODO TIMELINE ══ */}
      {mode === 'timeline' && (
        <div className="timeline fade-up">
          {agendaDays.length === 0 ? (
            <div className="day-panel__empty">Nenhum item no período selecionado.</div>
          ) : agendaDays.map(({ date, evs }) => (
            <div key={date.toISOString()} className="timeline__group">
              <div className="timeline__marker">
                <span className={`timeline__dot ${sameDay(date, today) ? 'timeline__dot--today' : ''}`}/>
                <span className="timeline__date">{sameDay(date, today) ? 'Hoje' : fmtDia(date)}</span>
              </div>
              <div className="timeline__items">
                {evs.map(it => (
                  <button key={it.id + date.toISOString().slice(0,10)}
                          className={`timeline__item ${ocorrenciaFeita(it, date) ? 'timeline__item--done' : ''}`}
                          onClick={() => onEdit(it)}>
                    <span className={`day-panel__hora ${!it.hora ? 'day-panel__hora--none' : ''}`}>{it.hora || '—:—'}</span>
                    <span className="timeline__item-title">{it.titulo}</span>
                    {D.temDias(it) && <span className="day-panel__badge">Rotina</span>}
                    {(it.prioridade === 'Crítica' || it.prioridade === 'Alta') && (
                      <span className="day-panel__badge day-panel__badge--alta">{it.prioridade}</span>
                    )}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// RELATÓRIOS — distribuições por status, prioridade, origem e categoria
// ────────────────────────────────────────────────────────────────────────────
function ReportBars({ title, icon: IconC, rows, criticalKeys = [], strongKeys = [] }) {
  const max = Math.max(1, ...rows.map(r => r.total));
  return (
    <div className="report-panel fade-up">
      <div className="report-panel__title"><IconC size={12}/> {title}</div>
      {rows.length === 0 ? (
        <div style={{ color: 'var(--color-text-quaternary)', fontFamily: 'var(--font-mono)', fontSize: 11 }}>
          Sem dados disponíveis
        </div>
      ) : rows.map(r => (
        <div key={r.nome} className="report-row">
          <div className="report-row__label" title={r.nome}>{r.nome}</div>
          <div className="report-row__bar">
            <div className={`report-row__fill ${criticalKeys.includes(r.nome) ? 'report-row__fill--critical' : strongKeys.includes(r.nome) ? 'report-row__fill--strong' : ''}`}
                 style={{ width: `${(r.total / max) * 100}%` }}/>
          </div>
          <div className="report-row__num">{r.total} {r.total === 1 ? 'Item' : 'Itens'}</div>
        </div>
      ))}
    </div>
  );
}

function ReportsView({ items, allCats, metrics }) {
  const countBy = (fn) => {
    const map = new Map();
    items.forEach(it => {
      const k = fn(it);
      if (!k) return;
      map.set(k, (map.get(k) || 0) + 1);
    });
    return [...map.entries()].map(([nome, total]) => ({ nome, total }))
                             .sort((a, b) => b.total - a.total);
  };

  const porStatus     = countBy(it => it.status);
  const porPrioridade = ['Crítica', 'Alta', 'Média', 'Baixa']
    .map(p => ({ nome: p, total: items.filter(it => it.prioridade === p).length }))
    .filter(r => r.total > 0);
  const porOrigem     = countBy(it => it.origem);
  const porCategoria  = allCats.map(c => ({ nome: c.nome, total: c.total }));

  return (
    <>
      <div className="view-head">
        <div className="view-head__title">Relatórios</div>
        <div className="view-head__meta">
          {items.length} {items.length === 1 ? 'Item' : 'Itens'} · {Math.round(metrics.pct)}% Concluídos
        </div>
      </div>
      <div className="report-grid">
        <ReportBars title="Distribuição por status" icon={Stats} rows={porStatus}
                    criticalKeys={['Bloqueado']} strongKeys={['Concluído']}/>
        <ReportBars title="Distribuição por prioridade" icon={Warning} rows={porPrioridade}
                    criticalKeys={['Crítica', 'Alta']}/>
        <ReportBars title="Distribuição por origem" icon={Layers} rows={porOrigem}/>
        <ReportBars title="Distribuição por categoria" icon={Box} rows={porCategoria}/>
      </div>
    </>
  );
}
