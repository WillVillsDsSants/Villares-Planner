  <style>
/* ============================================================================
   OPS PLANNER
   Design system: Villares Financial (dark editorial premium)
   Disposição: Mercado Livre (listas horizontais densas, tabs, sidebar fixa)
   ========================================================================= */

:root {
  --color-bg-base:       #070707;
  --color-bg-surface-1:  #0e0e0e;
  --color-bg-surface-2:  #141414;
  --color-bg-surface-3:  #1c1c1c;
  --color-bg-sidebar:    #050505;

  --color-text-primary:   rgba(255, 255, 255, 0.96);
  --color-text-secondary: rgba(255, 255, 255, 0.74);
  --color-text-tertiary:  rgba(255, 255, 255, 0.55);
  --color-text-quaternary: rgba(255, 255, 255, 0.28);

  --color-border-subtle:  rgba(255, 255, 255, 0.06);
  --color-border-default: rgba(255, 255, 255, 0.10);
  --color-border-strong:  rgba(255, 255, 255, 0.22);

  /* Cor viva única: vermelho saturado */
  --color-critical:      #DC2222;
  --color-critical-soft: rgba(220, 34, 34, 0.12);

  /* Tons neutros tomam o lugar de positive/warning/info */
  --color-neutral-strong: #E5E5E7;    /* "feito" / destaque positivo discreto */
  --color-neutral-mid:    #8a8a92;    /* "em andamento" / médio */
  --color-neutral-soft:   #4a4a52;    /* "pausado" / muted */

  --font-display: 'Syne', sans-serif;
  --font-sans:    'DM Sans', sans-serif;
  --font-mono:    'DM Mono', monospace;
}

html.light {
  --color-bg-base:       #efeff1;
  --color-bg-surface-1:  #ffffff;
  --color-bg-surface-2:  #f7f7f8;
  --color-bg-surface-3:  #e5e5ea;
  --color-text-primary:   #0e0e10;
  --color-text-secondary: #3f3f48;
  --color-text-tertiary:  #5e5e68;
  --color-text-quaternary: #93939c;
  --color-border-subtle:  #e5e5ea;
  --color-border-default: #d6d6d8;
  --color-border-strong:  #c7c7cc;

  --color-critical-soft:  rgba(220, 34, 34, 0.10);
  --color-neutral-strong: #18181b;
  --color-neutral-mid:    #737380;
  --color-neutral-soft:   #c7c7cc;
}

/* Cantos retos forçados — característica Villares */
*, *::before, *::after { border-radius: 0 !important; }

* {
  box-sizing: border-box;
  transition-property: background-color, border-color, color, fill, stroke, opacity, box-shadow;
  transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
  transition-duration: 200ms;
}

html, body {
  margin: 0; padding: 0;
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  color: var(--color-text-primary);
  background: var(--color-bg-base);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Ambience radial gradient (Villares hallmark) */
.ambience {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 0%, rgba(56, 189, 248, 0.04), transparent 50%),
    radial-gradient(ellipse 50% 35% at 80% 100%, rgba(34, 197, 94, 0.025), transparent 50%);
}
html.light .ambience { display: none; }

/* ============================================================================
   APP SHELL — sidebar fixa + main
   ========================================================================= */
.app {
  display: flex;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

/* SIDEBAR — dark sempre */
.sidebar {
  width: 64px;
  background: var(--color-bg-sidebar);
  border-right: 1px solid rgba(255, 255, 255, 0.08);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 0;
  position: sticky;
  top: 0;
  height: 100vh;
  flex-shrink: 0;
  z-index: 40;
}
.sidebar__logo {
  width: 32px; height: 32px;
  background: white;
  color: #050505;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 24px;
  flex-shrink: 0;
}
.sidebar__nav {
  display: flex; flex-direction: column;
  gap: 4px;
  flex: 1;
}
.sidebar__item {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255, 255, 255, 0.50);
  background: transparent;
  border: none;
  cursor: pointer;
  position: relative;
}
.sidebar__item:hover {
  color: rgba(255, 255, 255, 0.95);
  background: rgba(255, 255, 255, 0.05);
}
.sidebar__item--active {
  color: rgba(255, 255, 255, 0.95);
  background: rgba(255, 255, 255, 0.08);
}
.sidebar__item--active::before {
  content: '';
  position: absolute;
  left: -14px; top: 50%;
  transform: translateY(-50%);
  width: 3px; height: 16px;
  background: var(--color-neutral-strong);
}
.sidebar__footer {
  display: flex; flex-direction: column;
  gap: 4px;
  margin-top: auto;
}

/* MAIN */
.main {
  flex: 1;
  min-width: 0;
  display: flex; flex-direction: column;
}

/* ============================================================================
   TOPBAR (preta sólida estilo Villares header)
   ========================================================================= */
.topbar {
  background: var(--color-bg-sidebar);
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  padding: 0 24px;
  height: 56px;
  display: flex; align-items: center;
  gap: 16px;
  position: sticky; top: 0;
  z-index: 30;
}
.topbar__title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: white;
}
.topbar__title-accent {
  color: var(--color-neutral-strong);
}
.topbar__breadcrumb {
  margin-left: 24px;
  display: flex; align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: rgba(255, 255, 255, 0.4);
  letter-spacing: 0.04em;
}
.topbar__search {
  position: relative;
  margin-left: auto;
  width: 320px;
}
.topbar__search input {
  width: 100%;
  height: 34px;
  padding: 0 12px 0 36px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.10);
  color: white;
  font-family: var(--font-sans);
  font-size: 13px;
  outline: none;
}
.topbar__search input:focus {
  border-color: rgba(255, 255, 255, 0.25);
  background: rgba(255, 255, 255, 0.10);
}
.topbar__search input::placeholder { color: rgba(255, 255, 255, 0.35); }
.topbar__search-icon {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  color: rgba(255, 255, 255, 0.4);
}
.topbar__actions {
  display: flex; align-items: center;
  gap: 8px;
}
.topbar__btn {
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.10);
  color: rgba(255, 255, 255, 0.75);
  cursor: pointer;
}
.topbar__btn:hover {
  color: white;
  border-color: rgba(255, 255, 255, 0.25);
  background: rgba(255, 255, 255, 0.06);
}
.topbar__btn--bell { position: relative; }

.topbar__cta {
  display: inline-flex; align-items: center; gap: 6px;
  height: 34px;
  padding: 0 14px;
  background: white;
  color: var(--color-bg-sidebar);
  border: none;
  cursor: pointer;
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 500;
}
.topbar__cta:hover { background: #e5e5ea; }

/* ============================================================================
   PAGE BODY + HEADER
   ========================================================================= */
.page {
  padding: 28px 24px;
  flex: 1;
}

.page__header {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 16px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.page__header-title {
  font-family: var(--font-sans);
  font-size: 28px;
  font-weight: 500;
  color: var(--color-text-primary);
  letter-spacing: -0.02em;
  margin: 0;
}
.page__header-sub {
  margin-top: 6px;
  font-size: 13px;
  color: var(--color-text-tertiary);
  font-family: var(--font-mono);
  letter-spacing: 0.02em;
}

.page__header-meta {
  display: flex; align-items: center;
  gap: 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--color-text-tertiary);
  letter-spacing: 0.04em;
}
.live-dot {
  width: 6px; height: 6px; background: var(--color-neutral-strong);
  display: inline-block;
}
@keyframes pulse-soft {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.pulse-soft { animation: pulse-soft 2s ease-in-out infinite; }

/* ============================================================================
   SECTION TITLE (Villares style — uppercase tracking widest)
   ========================================================================= */
.section { margin-bottom: 32px; }
.section__title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--color-text-primary);
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 12px;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--color-border-subtle);
}
.section__title svg { color: var(--color-text-tertiary); }
.section__title-meta {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--color-text-tertiary);
  letter-spacing: 0.04em;
}

/* ============================================================================
   HERO — 4 KPI tiles em fileira + faixa Conclusão Geral (donut + breakdown)
   ========================================================================= */
.hero {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 1px;
  background: var(--color-border-subtle);
  border: 1px solid var(--color-border-subtle);
  margin-bottom: 1px;
}

.hero-bottom {
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 1px;
  background: var(--color-border-subtle);
  border: 1px solid var(--color-border-subtle);
  border-top: none;
  margin-bottom: 28px;
}
.hero-bottom > * {
  background: var(--color-bg-surface-1);
}

.kpi {
  background: var(--color-bg-surface-1);
  padding: 18px 22px;
  position: relative;
  display: flex; flex-direction: column;
  justify-content: space-between;
  min-height: 130px;
}
.kpi::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--color-border-default);
}
.kpi--positive::before { background: var(--color-neutral-strong); }
.kpi--negative::before { background: var(--color-critical); }
.kpi--warning::before  { background: var(--color-neutral-mid); }
.kpi--info::before     { background: var(--color-neutral-strong); }

.kpi__label {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--color-text-tertiary);
  display: flex; align-items: center; justify-content: space-between;
}
.kpi__value {
  font-family: var(--font-sans);
  font-size: 38px;
  font-weight: 400;
  letter-spacing: -0.03em;
  color: var(--color-text-primary);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.kpi__sub {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--color-text-secondary);
  letter-spacing: 0.04em;
}

/* Donut Conclusão Geral (esquerda da hero-bottom) */
.conclusion {
  padding: 24px 28px;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 24px;
  align-items: center;
}
.conclusion__chart {
  position: relative;
  flex-shrink: 0;
}
.conclusion__center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.conclusion__num {
  font-family: var(--font-sans);
  font-size: 32px;
  font-weight: 500;
  letter-spacing: -0.03em;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  color: var(--color-text-primary);
}
.conclusion__pct {
  font-size: 13px;
  color: var(--color-text-tertiary);
  margin-left: 2px;
}
.conclusion__info { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
.conclusion__label {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--color-text-tertiary);
}
.conclusion__caption {
  font-family: var(--font-sans);
  font-size: 15px;
  font-weight: 500;
  color: var(--color-text-primary);
  letter-spacing: -0.01em;
}
.conclusion__breakdown {
  display: flex; gap: 18px;
  margin-top: 2px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--color-text-secondary);
  letter-spacing: 0.02em;
}
.conclusion__breakdown b {
  color: var(--color-text-primary);
  font-weight: 500;
}

/* Painel: % por categoria (direita da hero-bottom) */
.cat-breakdown {
  padding: 18px 22px;
  display: flex; flex-direction: column;
  min-width: 0;
}
.cat-breakdown__header {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 10px;
  margin-bottom: 12px;
  border-bottom: 1px solid var(--color-border-subtle);
}
.cat-breakdown__title {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--color-text-tertiary);
  display: flex; align-items: center; gap: 8px;
}
.cat-breakdown__meta {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--color-text-tertiary);
  letter-spacing: 0.04em;
}
.cat-breakdown__grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 16px;
}
.cat-tile {
  display: flex; flex-direction: column;
  gap: 6px;
  min-width: 0;
}
.cat-tile__top {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 8px;
}
.cat-tile__name {
  font-family: var(--font-sans);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--color-text-primary);
  letter-spacing: -0.005em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cat-tile__pct {
  font-family: var(--font-mono);
  font-size: 13.5px;
  font-weight: 500;
  color: var(--color-text-primary);
  font-variant-numeric: tabular-nums;
}
.cat-tile__bar {
  height: 4px;
  width: 100%;
  background: var(--color-bg-surface-3);
}
.cat-tile__bar-fill {
  height: 100%;
  background: var(--color-text-primary);
  transition: width 900ms cubic-bezier(0.16, 1, 0.3, 1);
}
.cat-tile__bar-fill--critical { background: var(--color-critical); }
.cat-tile__ratio {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--color-text-tertiary);
  letter-spacing: 0.02em;
}

/* ============================================================================
   TABS (estilo Mercado Livre — underline com chip-count)
   ========================================================================= */
.tabs {
  display: flex;
  align-items: stretch;
  gap: 0;
  border-bottom: 1px solid var(--color-border-subtle);
  margin-bottom: 0;
  overflow-x: auto;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 18px;
  font-family: var(--font-sans);
  font-size: 13.5px;
  font-weight: 500;
  color: var(--color-text-tertiary);
  background: transparent;
  border: none;
  cursor: pointer;
  position: relative;
  white-space: nowrap;
  letter-spacing: -0.005em;
}
.tab:hover { color: var(--color-text-secondary); }
.tab--active {
  color: var(--color-text-primary);
}
.tab--active::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: -1px;
  height: 2px;
  background: var(--color-neutral-strong);
}
.tab__count {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  padding: 2px 7px;
  background: var(--color-bg-surface-2);
  color: var(--color-text-secondary);
  letter-spacing: 0.04em;
}
.tab--active .tab__count {
  background: transparent;
  color: var(--color-neutral-strong);
}

/* ============================================================================
   TOOLBAR — busca, filters, sort, view (ML-style action row)
   ========================================================================= */
.toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 0;
  border-bottom: 1px solid var(--color-border-subtle);
  flex-wrap: wrap;
}
.toolbar__field {
  position: relative;
  flex: 1 1 280px;
  max-width: 360px;
}
.toolbar__field-icon {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--color-text-tertiary);
}
.toolbar__field input {
  width: 100%; height: 34px;
  padding: 0 12px 0 36px;
  background: var(--color-bg-surface-1);
  border: 1px solid var(--color-border-default);
  color: var(--color-text-primary);
  font-family: var(--font-sans);
  font-size: 13px;
  outline: none;
}
.toolbar__field input:focus {
  border-color: var(--color-border-strong);
  background: var(--color-bg-surface-2);
}

.toolbar__select {
  height: 34px;
  padding: 0 12px;
  background: var(--color-bg-surface-1);
  border: 1px solid var(--color-border-default);
  color: var(--color-text-secondary);
  font-family: var(--font-sans);
  font-size: 12.5px;
  display: inline-flex; align-items: center; gap: 8px;
  cursor: pointer;
}
.toolbar__select:hover {
  color: var(--color-text-primary);
  border-color: var(--color-border-strong);
}
.toolbar__select-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--color-text-tertiary);
}
.toolbar__count {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--color-text-tertiary);
  letter-spacing: 0.04em;
}

/* ============================================================================
   LIST (ML-style horizontal density)
   Cada item é uma ROW com grid de colunas bem definidas
   ========================================================================= */
.list {
  display: flex; flex-direction: column;
  background: var(--color-bg-surface-1);
  border: 1px solid var(--color-border-subtle);
  border-top: none;
}
.list-row {
  display: grid;
  grid-template-columns: 36px minmax(0, 1.7fr) 140px 100px 110px 110px 120px 40px;
  align-items: center;
  gap: 16px;
  padding: 16px 22px;
  border-bottom: 1px solid var(--color-border-subtle);
  cursor: default;
  position: relative;
}
.list-row.list-row--menu-open { z-index: 100; }
.list-row:last-child { border-bottom: none; }
.list-row:hover { background: var(--color-bg-surface-2); }

.list-row__origem {
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: white;
}
.list-row__origem--projeto {
  background: var(--color-text-primary);
  color: var(--color-bg-base);
}
.list-row__origem--rotina {
  background: var(--color-bg-surface-3);
  color: var(--color-text-secondary);
  border: 1px solid var(--color-border-default);
}
.list-row__origem--pedido {
  background: var(--color-bg-surface-3);
  color: var(--color-text-primary);
  border: 1px solid var(--color-border-strong);
}

.list-row__main { min-width: 0; }
.list-row__title {
  font-family: var(--font-sans);
  font-size: 14.5px;
  font-weight: 500;
  color: var(--color-text-primary);
  letter-spacing: -0.005em;
  line-height: 1.35;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.list-row__sub {
  margin-top: 6px;
  font-family: var(--font-sans);
  font-size: 12.5px;
  font-weight: 400;
  color: var(--color-text-tertiary);
  letter-spacing: 0;
  display: flex; align-items: center; gap: 8px;
  line-height: 1.3;
}
.list-row__sub-dot { width: 3px; height: 3px; background: var(--color-text-quaternary); }

/* Coluna: categoria tag */
.tag-cat {
  font-family: var(--font-sans);
  font-size: 12px;
  letter-spacing: -0.005em;
  padding: 5px 10px;
  background: var(--color-bg-surface-2);
  color: var(--color-text-secondary);
  border: 1px solid var(--color-border-subtle);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: center;
}

/* Coluna: prioridade */
.tag-prio {
  font-family: var(--font-sans);
  font-size: 11.5px;
  font-weight: 500;
  letter-spacing: 0;
  padding: 5px 11px;
  text-align: center;
  border: 1px solid var(--color-border-default);
  color: var(--color-text-secondary);
}
.tag-prio--alta {
  color: var(--color-critical);
  background: var(--color-critical-soft);
  border-color: rgba(220, 34, 34, 0.32);
}
.tag-prio--media {
  color: var(--color-text-secondary);
  background: transparent;
  border-color: var(--color-border-default);
}

/* Colunas: data (criado em / prazo) — maior peso visual */
.date-cell {
  display: flex; flex-direction: column;
  gap: 3px;
  font-family: var(--font-sans);
  letter-spacing: -0.005em;
}
.date-cell__primary {
  font-size: 13.5px;
  font-weight: 500;
  color: var(--color-text-primary);
  font-variant-numeric: tabular-nums;
}
.date-cell__primary--late { color: var(--color-critical); font-weight: 600; }
.date-cell__primary--today { color: var(--color-text-primary); font-weight: 600; }
.date-cell__sub {
  font-size: 11.5px;
  font-weight: 400;
  color: var(--color-text-tertiary);
  font-variant-numeric: tabular-nums;
}
.date-cell__sub--late { color: var(--color-critical); }
.date-cell__none {
  font-size: 13px;
  color: var(--color-text-quaternary);
}

/* Coluna: status badge */
.status {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: var(--font-sans);
  font-size: 12.5px;
  font-weight: 500;
  padding: 5px 11px;
  letter-spacing: -0.005em;
}
.status__dot { width: 6px; height: 6px; flex-shrink: 0; }
.status--pendente   { color: var(--color-text-secondary); background: var(--color-bg-surface-2); }
.status--pendente .status__dot { background: var(--color-text-tertiary); }
.status--andamento  { color: var(--color-neutral-strong); background: transparent; }
.status--andamento .status__dot { background: var(--color-neutral-strong); }
.status--pausado    { color: var(--color-neutral-mid); background: transparent; }
.status--pausado .status__dot { background: var(--color-neutral-mid); }
.status--concluido  { color: var(--color-neutral-strong); background: transparent; }
.status--concluido .status__dot { background: var(--color-neutral-strong); }
.status--bloqueado  { color: var(--color-critical); background: var(--color-critical-soft); }
.status--bloqueado .status__dot { background: var(--color-critical); }

/* Botão ação (⋯) */
.list-row__action {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  background: transparent;
  border: 1px solid transparent;
  color: var(--color-text-tertiary);
  cursor: pointer;
}
.list-row:hover .list-row__action {
  border-color: var(--color-border-default);
  color: var(--color-text-secondary);
}

.list-row__action:hover {
  color: var(--color-text-primary);
  background: var(--color-bg-surface-3);
}

/* Empty state */
.list-empty {
  background: var(--color-bg-surface-1);
  border: 1px solid var(--color-border-subtle);
  border-top: none;
  padding: 56px 24px;
  text-align: center;
  font-family: var(--font-sans);
  font-size: 13px;
  color: var(--color-text-tertiary);
}

/* List header row (clickable filter columns) */
.list-header {
  display: grid;
  grid-template-columns: 36px minmax(0, 1.7fr) 140px 100px 110px 110px 120px 40px;
  align-items: center;
  gap: 16px;
  padding: 14px 22px;
  background: var(--color-bg-surface-2);
  border: 1px solid var(--color-border-subtle);
  font-family: var(--font-sans);
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--color-text-tertiary);
  text-transform: uppercase;
}
.list-header__cell {
  display: inline-flex; align-items: center; gap: 6px;
  background: transparent;
  border: none;
  cursor: pointer;
  font: inherit;
  color: inherit;
  letter-spacing: inherit;
  text-transform: inherit;
  padding: 0;
  user-select: none;
  text-align: left;
  transition: color 150ms;
}
.list-header__cell:hover { color: var(--color-text-primary); }
.list-header__cell--active { color: var(--color-text-primary); }
.list-header__cell-icon {
  width: 12px; height: 12px;
  color: var(--color-text-quaternary);
  transition: color 150ms, transform 200ms;
}
.list-header__cell--active .list-header__cell-icon {
  color: var(--color-text-primary);
}
.list-header__cell--desc .list-header__cell-icon {
  transform: rotate(180deg);
}

/* ============================================================================
   ASIDE GRID (após a lista) — Próximos vencimentos + Por categoria
   ========================================================================= */
.aside-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--color-border-subtle);
  border: 1px solid var(--color-border-subtle);
  margin-top: 28px;
}
.aside-panel {
  background: var(--color-bg-surface-1);
  padding: 20px 22px;
}
.aside-panel__title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--color-text-primary);
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--color-border-subtle);
}
.aside-panel__title-meta {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--color-text-tertiary);
}

/* Próximos vencimentos */
.upcoming { display: flex; flex-direction: column; }
.upcoming-row {
  display: grid;
  grid-template-columns: 70px 1fr 70px;
  gap: 12px;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--color-border-subtle);
}
.upcoming-row:last-child { border-bottom: none; padding-bottom: 0; }
.upcoming-row:first-child { padding-top: 0; }
.upcoming-row__date {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--color-text-tertiary);
  letter-spacing: 0.02em;
}
.upcoming-row__date--late { color: var(--color-critical); }
.upcoming-row__date--today { color: var(--color-neutral-mid); }
.upcoming-row__title {
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--color-text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: -0.005em;
}
.upcoming-row__cat {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--color-text-tertiary);
  margin-top: 2px;
  letter-spacing: 0.02em;
}
.upcoming-row__origem {
  font-family: var(--font-sans);
  font-size: 10.5px;
  font-weight: 500;
  letter-spacing: -0.005em;
  padding: 3px 8px;
  text-align: center;
}
.upcoming-row__origem--projeto { background: transparent; color: var(--color-neutral-strong); }
.upcoming-row__origem--rotina  { background: var(--color-bg-surface-2); color: var(--color-text-secondary); border: 1px solid var(--color-border-subtle); }
.upcoming-row__origem--pedido  { background: transparent; color: var(--color-neutral-mid); }

/* Categorias com barras */
.cat-list { display: flex; flex-direction: column; gap: 14px; }
.cat-row__head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 6px;
}
.cat-row__name {
  font-family: var(--font-sans);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--color-text-primary);
  letter-spacing: -0.005em;
}
.cat-row__ratio {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--color-text-tertiary);
  margin-left: 6px;
  letter-spacing: 0.02em;
}
.cat-row__pct {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--color-text-primary);
  font-variant-numeric: tabular-nums;
}
.bar {
  height: 5px;
  width: 100%;
  background: var(--color-bg-surface-3);
  overflow: hidden;
}
.bar__fill {
  height: 100%;
  background: var(--color-text-primary);
  transition: width 900ms cubic-bezier(0.16, 1, 0.3, 1);
}
.bar__fill--positive { background: var(--color-neutral-strong); }
.bar__fill--warning  { background: var(--color-neutral-mid); }
.bar__fill--negative { background: var(--color-critical); }

/* ============================================================================
   FOOTER
   ========================================================================= */
.footer {
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px solid var(--color-border-subtle);
  display: flex; align-items: center; justify-content: space-between;
  font-family: var(--font-sans);
  font-size: 12px;
  color: var(--color-text-tertiary);
}

/* ============================================================================
   SYNC INDICATOR (no page header)
   ========================================================================= */
.sync-indicator {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px;
  border: 1px solid var(--color-border-default);
  background: var(--color-bg-surface-1);
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: -0.005em;
  color: var(--color-text-secondary);
  cursor: pointer;
}
.sync-indicator:hover {
  color: var(--color-text-primary);
  border-color: var(--color-border-strong);
}
.sync-indicator__dot {
  width: 7px; height: 7px;
  background: var(--color-text-quaternary);
  flex-shrink: 0;
}
.sync-indicator--synced .sync-indicator__dot { background: var(--color-neutral-strong); }
.sync-indicator--syncing .sync-indicator__dot {
  background: var(--color-neutral-mid);
  animation: pulse-soft 1s ease-in-out infinite;
}
.sync-indicator--error { color: var(--color-critical); border-color: rgba(220, 34, 34, 0.32); }
.sync-indicator--error .sync-indicator__dot { background: var(--color-critical); }
.sync-indicator--offline .sync-indicator__dot { background: var(--color-text-quaternary); }

/* Banner de erro/info no topo do conteúdo */
.banner {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 18px;
  margin-bottom: 18px;
  border: 1px solid var(--color-border-default);
  background: var(--color-bg-surface-2);
}
.banner__icon { color: var(--color-text-tertiary); flex-shrink: 0; margin-top: 1px; }
.banner__body { flex: 1; font-size: 13.5px; }
.banner__title {
  font-weight: 600;
  color: var(--color-text-primary);
  margin-bottom: 2px;
}
.banner__text {
  color: var(--color-text-secondary);
  font-size: 13px;
}
.banner__action {
  background: transparent;
  border: 1px solid var(--color-border-default);
  color: var(--color-text-primary);
  font-family: var(--font-sans);
  font-size: 12.5px;
  font-weight: 500;
  padding: 6px 12px;
  cursor: pointer;
  flex-shrink: 0;
}
.banner__action:hover {
  background: var(--color-bg-surface-3);
  border-color: var(--color-border-strong);
}
.banner__close {
  background: transparent; border: none;
  color: var(--color-text-tertiary);
  cursor: pointer;
  flex-shrink: 0;
  padding: 4px;
}
.banner__close:hover { color: var(--color-text-primary); }
.banner--error { border-color: rgba(220, 34, 34, 0.32); background: var(--color-critical-soft); }
.banner--error .banner__icon, .banner--error .banner__title { color: var(--color-critical); }

/* Settings modal — code/help blocks */
.help-block {
  background: var(--color-bg-surface-2);
  border-left: 2px solid var(--color-border-strong);
  padding: 10px 14px;
  font-family: var(--font-sans);
  font-size: 12.5px;
  color: var(--color-text-secondary);
  letter-spacing: -0.005em;
  line-height: 1.6;
}
.help-block code {
  font-family: var(--font-mono);
  font-size: 11.5px;
  padding: 1px 5px;
  background: var(--color-bg-surface-3);
  color: var(--color-text-primary);
}
.help-block a {
  color: var(--color-text-primary);
  text-decoration: underline;
  text-underline-offset: 2px;
}
.test-result {
  margin-top: 8px;
  font-family: var(--font-sans);
  font-size: 12.5px;
}
.test-result--ok { color: var(--color-neutral-strong); }
.test-result--err { color: var(--color-critical); }

/* ============================================================================
   ANIMATIONS
   ========================================================================= */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp 320ms cubic-bezier(0.16, 1, 0.3, 1) both; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.96) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* ============================================================================
   BUTTON (genérico)
   ========================================================================= */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  height: 36px;
  padding: 0 16px;
  background: var(--color-bg-surface-2);
  border: 1px solid var(--color-border-default);
  color: var(--color-text-secondary);
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: -0.005em;
}
.btn:hover {
  color: var(--color-text-primary);
  border-color: var(--color-border-strong);
  background: var(--color-bg-surface-3);
}
.btn--primary {
  background: var(--color-text-primary);
  color: var(--color-bg-base);
  border-color: var(--color-text-primary);
}
.btn--primary:hover {
  background: var(--color-text-primary);
  color: var(--color-bg-base);
  opacity: 0.88;
}
.btn--danger {
  color: var(--color-critical);
  border-color: rgba(220, 34, 34, 0.32);
}
.btn--danger:hover {
  color: var(--color-critical);
  background: var(--color-critical-soft);
  border-color: var(--color-critical);
}

/* ============================================================================
   DROPDOWN (menu de ações da row)
   ========================================================================= */
.dropdown {
  position: relative;
  display: inline-block;
}
.dropdown__menu {
  position: absolute;
  right: 0;
  top: calc(100% + 6px);
  min-width: 190px;
  background: var(--color-bg-surface-1);
  border: 1px solid var(--color-border-default);
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.55);
  z-index: 60;
  padding: 4px 0;
  animation: scaleIn 140ms cubic-bezier(0.16, 1, 0.3, 1);
  transform-origin: top right;
}
html.light .dropdown__menu {
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
}
.dropdown__item {
  display: flex; align-items: center; gap: 10px;
  width: 100%;
  padding: 9px 14px;
  background: transparent;
  border: none;
  color: var(--color-text-secondary);
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  text-align: left;
  letter-spacing: -0.005em;
}
.dropdown__item:hover {
  background: var(--color-bg-surface-2);
  color: var(--color-text-primary);
}
.dropdown__item svg { color: var(--color-text-tertiary); flex-shrink: 0; }
.dropdown__item:hover svg { color: var(--color-text-primary); }
.dropdown__item--danger { color: var(--color-critical); }
.dropdown__item--danger svg { color: var(--color-critical); }
.dropdown__item--danger:hover {
  background: var(--color-critical-soft);
  color: var(--color-critical);
}
.dropdown__item--danger:hover svg { color: var(--color-critical); }
.dropdown__divider {
  height: 1px;
  background: var(--color-border-subtle);
  margin: 4px 0;
}

/* ============================================================================
   MODAL
   ========================================================================= */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  padding: 24px;
  animation: fadeIn 180ms ease-out;
}
.modal {
  background: var(--color-bg-surface-1);
  border: 1px solid var(--color-border-default);
  width: 600px;
  max-width: 100%;
  max-height: 90vh;
  display: flex; flex-direction: column;
  box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
  animation: scaleIn 220ms cubic-bezier(0.16, 1, 0.3, 1);
}
.modal__header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--color-border-subtle);
  display: flex; align-items: center; justify-content: space-between;
}
.modal__title {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: var(--color-text-primary);
}
.modal__close {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  background: transparent;
  border: 1px solid transparent;
  color: var(--color-text-tertiary);
  cursor: pointer;
}
.modal__close:hover {
  color: var(--color-text-primary);
  background: var(--color-bg-surface-2);
  border-color: var(--color-border-default);
}
.modal__body {
  padding: 22px 24px;
  overflow-y: auto;
  flex: 1;
}
.modal__footer {
  padding: 16px 24px;
  border-top: 1px solid var(--color-border-subtle);
  display: flex; gap: 10px; justify-content: flex-end;
}

/* ============================================================================
   FORM
   ========================================================================= */
.form-group { margin-bottom: 18px; }
.form-group:last-child { margin-bottom: 0; }
.form-group__label {
  display: block;
  font-family: var(--font-sans);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--color-text-secondary);
  margin-bottom: 7px;
  letter-spacing: -0.005em;
}
.form-group__label-req {
  color: var(--color-critical);
  margin-left: 3px;
}
.form-group__hint {
  font-size: 11.5px;
  color: var(--color-text-tertiary);
  margin-top: 5px;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 10px 12px;
  background: var(--color-bg-surface-2);
  border: 1px solid var(--color-border-default);
  color: var(--color-text-primary);
  font-family: var(--font-sans);
  font-size: 13.5px;
  letter-spacing: -0.005em;
  outline: none;
}
.form-input::placeholder { color: var(--color-text-quaternary); }
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--color-border-strong);
  background: var(--color-bg-surface-3);
}
.form-textarea {
  resize: vertical;
  min-height: 72px;
  font-family: var(--font-sans);
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.form-segmented {
  display: flex;
  gap: 0;
  border: 1px solid var(--color-border-default);
}
.form-segmented__item {
  flex: 1;
  padding: 9px 12px;
  background: var(--color-bg-surface-2);
  border: none;
  border-right: 1px solid var(--color-border-default);
  color: var(--color-text-secondary);
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  letter-spacing: -0.005em;
}
.form-segmented__item:last-child { border-right: none; }
.form-segmented__item:hover {
  color: var(--color-text-primary);
  background: var(--color-bg-surface-3);
}
.form-segmented__item--active {
  background: var(--color-text-primary);
  color: var(--color-bg-base);
}
.form-segmented__item--active:hover {
  background: var(--color-text-primary);
  color: var(--color-bg-base);
  opacity: 0.88;
}

/* ============================================================================
   ANIMATIONS DUPLICATE GUARD
   ========================================================================= */

/* ============================================================================
   RESPONSIVE
   ========================================================================= */
@media (max-width: 1280px) {
  .hero { grid-template-columns: 1fr 1fr; }
  .hero-bottom { grid-template-columns: 1fr; }
  .cat-breakdown__grid { grid-template-columns: repeat(5, 1fr); }
}
@media (max-width: 960px) {
  .hero { grid-template-columns: 1fr 1fr; }
  .cat-breakdown__grid { grid-template-columns: repeat(3, 1fr); }
  .list-row {
    grid-template-columns: 36px minmax(0, 1.5fr) 110px 110px 110px 40px;
  }
  .list-row > :nth-child(3),
  .list-row > :nth-child(4) { display: none; }
  .list-header {
    grid-template-columns: 36px minmax(0, 1.5fr) 110px 110px 110px 40px;
  }
  .list-header > :nth-child(3),
  .list-header > :nth-child(4) { display: none; }
  .aside-grid { grid-template-columns: 1fr; }
}
@media (max-width: 720px) {
  .topbar__search { width: auto; flex: 1; }
  .topbar__breadcrumb { display: none; }
  .hero { grid-template-columns: 1fr; }
  .cat-breakdown__grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 640px) {
  .page { padding: 18px 14px; }
  .page__header-title { font-size: 22px; }
  .sidebar { display: none; }
  .list-row {
    grid-template-columns: 36px 1fr 110px;
    gap: 10px;
    padding: 12px 14px;
  }
  .list-row > :nth-child(3),
  .list-row > :nth-child(4),
  .list-row > :nth-child(5),
  .list-row > :nth-child(6),
  .list-row > :nth-child(8) { display: none; }
  .list-header { display: none; }
}


/* ── Form: chips de categoria (multi-seleção) ── */
.form-chips {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 5px;
}
.form-chip {
  font-family: var(--font-sans);
  font-size: 12px;
  padding: 6px 9px;
  background: var(--color-bg-surface-2);
  color: var(--color-text-secondary);
  border: 1px solid var(--color-border-subtle);
  cursor: pointer;
  text-align: left;
  display: flex; align-items: center; gap: 7px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.form-chip:hover { border-color: var(--color-border-strong); color: var(--color-text-primary); }
.form-chip--active {
  background: var(--color-neutral-strong);
  color: var(--color-bg-base);
  border-color: var(--color-neutral-strong);
  font-weight: 600;
}
.form-chip__mark { font-family: var(--font-mono); font-size: 10px; opacity: 0.85; }

/* ── Título de seção das views ── */
.view-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin: 26px 0 4px;
}
.view-head__title {
  font-family: var(--font-display);
  font-size: 21px; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--color-text-primary);
}
.view-head__meta {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--color-text-tertiary); letter-spacing: 0.04em;
}

/* ── Calendário ── */
.cal { border: 1px solid var(--color-border-subtle); background: var(--color-bg-surface-1); margin-top: 14px; }
.cal__bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid var(--color-border-subtle);
}
.cal__month {
  font-family: var(--font-display); font-size: 15px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
}
.cal__nav { display: flex; gap: 6px; }
.cal__nav-btn {
  font-family: var(--font-mono); font-size: 11px;
  background: var(--color-bg-surface-2); color: var(--color-text-secondary);
  border: 1px solid var(--color-border-subtle);
  padding: 6px 12px; cursor: pointer;
}
.cal__nav-btn:hover { border-color: var(--color-border-strong); color: var(--color-text-primary); }
.cal__dows {
  display: grid; grid-template-columns: repeat(7, 1fr);
  border-bottom: 1px solid var(--color-border-subtle);
}
.cal__dow {
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--color-text-quaternary);
  padding: 8px 10px; text-align: left;
}
.cal__grid { display: grid; grid-template-columns: repeat(7, 1fr); }
.cal__cell {
  min-height: 96px; padding: 8px;
  border-right: 1px solid var(--color-border-subtle);
  border-bottom: 1px solid var(--color-border-subtle);
  display: flex; flex-direction: column; gap: 4px;
}
.cal__cell:nth-child(7n) { border-right: none; }
.cal__cell--out { opacity: 0.35; }
.cal__cell--today { background: var(--color-bg-surface-2); box-shadow: inset 0 2px 0 var(--color-neutral-strong); }
.cal__day { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-tertiary); }
.cal__cell--today .cal__day { color: var(--color-text-primary); font-weight: 500; }
.cal__ev {
  font-size: 11px; line-height: 1.25; padding: 3px 6px;
  background: var(--color-bg-surface-3); color: var(--color-text-secondary);
  border-left: 2px solid var(--color-neutral-mid);
  cursor: pointer;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  text-align: left; width: 100%; border-top: none; border-right: none; border-bottom: none;
  font-family: var(--font-sans);
}
.cal__ev:hover { color: var(--color-text-primary); background: var(--color-bg-surface-2); }
.cal__ev--late { border-left-color: var(--color-critical); color: var(--color-critical); background: var(--color-critical-soft); }
.cal__ev--done { border-left-color: var(--color-neutral-soft); color: var(--color-text-quaternary); text-decoration: line-through; }
.cal__more { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-quaternary); padding-left: 6px; }

/* ── Relatórios ── */
.report-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 14px; margin-top: 14px;
}
.report-panel { border: 1px solid var(--color-border-subtle); background: var(--color-bg-surface-1); padding: 18px; }
.report-panel--wide { grid-column: 1 / -1; }
.report-panel__title {
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--color-text-tertiary);
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.report-row { display: flex; align-items: center; gap: 12px; padding: 7px 0; }
.report-row__label { flex: 0 0 170px; font-size: 12.5px; color: var(--color-text-secondary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.report-row__bar { flex: 1; height: 6px; background: var(--color-bg-surface-3); }
.report-row__fill { height: 100%; background: var(--color-neutral-mid); }
.report-row__fill--strong { background: var(--color-neutral-strong); }
.report-row__fill--critical { background: var(--color-critical); }
.report-row__num { font-family: var(--font-mono); font-size: 11.5px; color: var(--color-text-secondary); flex: 0 0 64px; text-align: right; }

/* ── Equipe ── */
.team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; margin-top: 14px; }
.team-card { border: 1px solid var(--color-border-subtle); background: var(--color-bg-surface-1); padding: 18px; }
.team-card__name { font-family: var(--font-display); font-size: 15px; font-weight: 700; letter-spacing: 0.02em; }
.team-card__role { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-text-quaternary); margin: 3px 0 14px; }
.team-card__stats { display: flex; gap: 18px; margin-bottom: 12px; }
.team-card__stat-num { font-family: var(--font-mono); font-size: 18px; color: var(--color-text-primary); }
.team-card__stat-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-text-quaternary); }
.empty-view {
  border: 1px dashed var(--color-border-default);
  padding: 56px 24px; text-align: center; margin-top: 14px;
  color: var(--color-text-tertiary); font-family: var(--font-mono); font-size: 12px;
  letter-spacing: 0.04em;
}

/* ── Fix: form dentro do modal precisa participar do flex para o body rolar ── */
.modal > form {
  display: flex; flex-direction: column;
  flex: 1; min-height: 0; overflow: hidden;
}
.modal__body { min-height: 0; }

/* ── Dropdown ancorado à esquerda (toolbar) ── */
.dropdown__menu--left { left: 0; right: auto; transform-origin: top left; }
.dropdown__item--active { color: var(--color-text-primary); background: var(--color-bg-surface-2); }
.dropdown__check { font-family: var(--font-mono); font-size: 10px; margin-left: auto; }

/* ── Kanban ── */
.kanban {
  display: grid;
  grid-template-columns: repeat(5, minmax(228px, 1fr));
  gap: 12px; margin-top: 14px;
  overflow-x: auto; align-items: start;
  padding-bottom: 8px;
}
.kanban__col {
  background: var(--color-bg-surface-1);
  border: 1px solid var(--color-border-subtle);
  min-height: 220px;
  display: flex; flex-direction: column;
}
.kanban__col--over { border-color: var(--color-border-strong); background: var(--color-bg-surface-2); }
.kanban__col-head {
  padding: 12px 14px;
  border-bottom: 1px solid var(--color-border-subtle);
  display: flex; align-items: center; justify-content: space-between;
}
.kanban__col-title {
  font-family: var(--font-mono); font-size: 10.5px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--color-text-tertiary);
  display: flex; align-items: center; gap: 8px;
}
.kanban__col-dot { width: 7px; height: 7px; background: var(--color-neutral-mid); }
.kanban__col--done .kanban__col-dot { background: var(--color-neutral-strong); }
.kanban__col--blocked .kanban__col-dot { background: var(--color-critical); }
.kanban__col-count { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-quaternary); }
.kanban__cards { padding: 10px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
.kanban__card {
  background: var(--color-bg-surface-2);
  border: 1px solid var(--color-border-subtle);
  border-left: 2px solid var(--color-neutral-soft);
  padding: 11px 12px;
  cursor: grab;
}
.kanban__card:hover { border-color: var(--color-border-strong); }
.kanban__card:active { cursor: grabbing; }
.kanban__card--dragging { opacity: 0.35; }
.kanban__card--alta { border-left-color: var(--color-critical); }
.kanban__card--media { border-left-color: var(--color-neutral-mid); }
.kanban__card-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); line-height: 1.35; margin-bottom: 7px; }
.kanban__card-meta {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em;
  color: var(--color-text-quaternary);
}
.kanban__card-meta .late { color: var(--color-critical); }
.kanban__empty {
  font-family: var(--font-mono); font-size: 10.5px; color: var(--color-text-quaternary);
  text-align: center; padding: 22px 8px; border: 1px dashed var(--color-border-subtle);
}

/* ── Notas ── */
.notes-toolbar { display: flex; justify-content: flex-end; margin-top: 14px; }
.notes-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px; margin-top: 14px; align-items: start;
}
.note {
  background: var(--color-bg-surface-1);
  border: 1px solid var(--color-border-subtle);
  display: flex; flex-direction: column;
}
.note--pinned { border-color: var(--color-border-strong); box-shadow: inset 0 2px 0 var(--color-neutral-strong); }
.note__bar {
  display: flex; align-items: center; gap: 4px;
  padding: 8px 10px; border-bottom: 1px solid var(--color-border-subtle);
}
.note__date { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-quaternary); letter-spacing: 0.05em; margin-right: auto; }
.note__btn {
  width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid transparent;
  color: var(--color-text-quaternary); cursor: pointer;
}
.note__btn:hover { color: var(--color-text-primary); border-color: var(--color-border-default); background: var(--color-bg-surface-2); }
.note__btn--on { color: var(--color-text-primary); }
.note__btn--danger:hover { color: var(--color-critical); border-color: var(--color-critical); background: var(--color-critical-soft); }
.note__title {
  background: transparent; border: none; outline: none;
  font-family: var(--font-display); font-size: 14.5px; font-weight: 700;
  color: var(--color-text-primary);
  padding: 12px 14px 0; width: 100%;
}
.note__title::placeholder { color: var(--color-text-quaternary); }
.note__text {
  background: transparent; border: none; outline: none; resize: vertical;
  font-family: var(--font-sans); font-size: 13px; line-height: 1.55;
  color: var(--color-text-secondary);
  padding: 8px 14px 14px; width: 100%; min-height: 110px;
}
.note__text::placeholder { color: var(--color-text-quaternary); }

/* ── Calendário: robustez de grade ── */
.cal { overflow: hidden; }
.cal__dows, .cal__grid { grid-template-columns: repeat(7, minmax(0, 1fr)); }
.cal__cell { min-width: 0; overflow: hidden; }
.cal__ev { display: block; }
.cal__grid .cal__cell:nth-last-child(-n+7) { border-bottom: none; }

/* ── Hora no título da lista ── */
.list-row__hora {
  font-family: var(--font-mono); font-size: 12px; font-weight: 500;
  color: var(--color-text-secondary); letter-spacing: 0.02em;
}
.list-row__hora-sep { color: var(--color-text-quaternary); margin: 0 7px; }

/* ── Descrição visível na lista ── */
.list-row__desc {
  font-size: 12px; color: var(--color-text-tertiary); line-height: 1.45;
  margin: 2px 0 3px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.list--compact .list-row__desc { display: none; }
.list--compact .list-row { padding-top: 9px; padding-bottom: 9px; }
.list--compact .list-row__sub { display: none; }

/* ── Prioridade Crítica ── */
.tag-prio--critica {
  color: #FFFFFF;
  background: var(--color-critical);
  border-color: var(--color-critical);
  font-weight: 600;
}
.kanban__card--critica { border-left-color: var(--color-critical); border-left-width: 3px; }

/* ── Chips de dia da semana ── */
.day-chips { display: flex; gap: 4px; flex-wrap: wrap; }
.day-chip {
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em;
  padding: 6px 0; flex: 1; min-width: 42px; text-align: center;
  background: var(--color-bg-surface-2);
  color: var(--color-text-secondary);
  border: 1px solid var(--color-border-subtle);
  cursor: pointer;
}
.day-chip:hover { border-color: var(--color-border-strong); color: var(--color-text-primary); }
.day-chip--active {
  background: var(--color-neutral-strong); color: var(--color-bg-base);
  border-color: var(--color-neutral-strong); font-weight: 600;
}

/* ── Filtros do calendário ── */
.cal-filters {
  display: flex; gap: 5px; flex-wrap: wrap; align-items: center;
  margin-top: 14px;
}
.cal-filter {
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.05em;
  padding: 6px 12px;
  background: var(--color-bg-surface-1); color: var(--color-text-tertiary);
  border: 1px solid var(--color-border-subtle); cursor: pointer;
}
.cal-filter:hover { color: var(--color-text-primary); border-color: var(--color-border-strong); }
.cal-filter--active {
  background: var(--color-neutral-strong); color: var(--color-bg-base);
  border-color: var(--color-neutral-strong); font-weight: 600;
}
.cal-filters__hint {
  font-family: var(--font-mono); font-size: 10px; color: var(--color-text-quaternary);
  margin-left: auto;
}

/* ── Navegação rápida de datas ── */
.cal-nav {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  flex-wrap: wrap; margin-top: 10px;
}
.cal-nav__group { display: flex; align-items: center; gap: 6px; }
.cal-nav__label { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-text-quaternary); }
.cal-nav__date { width: 170px; padding: 7px 10px; font-size: 12.5px; }
.cal__nav-btn--strong { background: var(--color-neutral-strong); color: var(--color-bg-base); border-color: var(--color-neutral-strong); font-weight: 600; }
.cal__nav-btn--strong:hover { color: var(--color-bg-base); opacity: 0.9; }

/* ── Célula selecionada + eventos ── */
.cal__cell { cursor: pointer; }
.cal__cell--selected { box-shadow: inset 0 0 0 1px var(--color-neutral-strong); }
.cal__ev--rotina { border-left-style: double; border-left-width: 3px; }
.cal__ev-hora { font-family: var(--font-mono); font-size: 9.5px; color: var(--color-text-tertiary); margin-right: 5px; }

/* ── Painel do dia ── */
.day-panel {
  border: 1px solid var(--color-border-subtle);
  background: var(--color-bg-surface-1);
  margin-top: 14px;
}
.day-panel__head {
  display: flex; align-items: baseline; justify-content: space-between;
  padding: 13px 18px; border-bottom: 1px solid var(--color-border-subtle);
}
.day-panel__title {
  font-family: var(--font-display); font-size: 13.5px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
}
.day-panel__meta { font-family: var(--font-mono); font-size: 11px; color: var(--color-text-quaternary); }
.day-panel__empty {
  padding: 26px 18px; text-align: center;
  font-family: var(--font-mono); font-size: 11px; color: var(--color-text-quaternary);
}
.day-panel__list { display: flex; flex-direction: column; }
.day-panel__row {
  display: flex; align-items: center; gap: 14px;
  padding: 11px 18px; text-align: left; width: 100%;
  background: transparent; border: none;
  border-bottom: 1px solid var(--color-border-subtle);
  cursor: pointer;
}
.day-panel__row:last-child { border-bottom: none; }
.day-panel__row:hover { background: var(--color-bg-surface-2); }
.day-panel__hora {
  font-family: var(--font-mono); font-size: 12px; font-weight: 500;
  color: var(--color-text-primary); flex: 0 0 52px;
}
.day-panel__hora--none { color: var(--color-text-quaternary); }
.day-panel__item-title { font-size: 13px; color: var(--color-text-primary); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.day-panel__item-title--done { color: var(--color-text-quaternary); text-decoration: line-through; }
.day-panel__desc { color: var(--color-text-tertiary); font-size: 12px; }
.day-panel__badges { display: flex; gap: 5px; flex-shrink: 0; }
.day-panel__badge {
  font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 3px 7px; border: 1px solid var(--color-border-default); color: var(--color-text-tertiary);
}
.day-panel__badge--alta { color: var(--color-critical); border-color: rgba(220, 34, 34, 0.4); background: var(--color-critical-soft); }

/* ── Refinamento geral de UX ── */
:focus-visible { outline: 1px solid var(--color-neutral-strong); outline-offset: 2px; }
.list-row { transition: background 130ms ease, border-color 130ms ease; }
.kanban__card { transition: border-color 130ms ease, transform 130ms ease, box-shadow 130ms ease; }
.kanban__card:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0, 0, 0, 0.28); }
.note { transition: border-color 130ms ease; }
.note:hover { border-color: var(--color-border-strong); }
.cal-filter, .day-chip, .form-chip, .cal__nav-btn, .btn, .toolbar__select { transition: background 120ms ease, color 120ms ease, border-color 120ms ease; }
.cal__cell { transition: background 120ms ease; }
.cal__cell:hover { background: var(--color-bg-surface-2); }
@media (max-width: 900px) {
  .cal-filters__hint { display: none; }
  .cal__cell { min-height: 64px; }
  .day-panel__desc { display: none; }
}

/* ════ REVISÃO UX v0.5 ════ */

/* ── Navegação de data no cabeçalho ── */
.date-nav { display: flex; align-items: center; gap: 5px; }
.date-nav__btn {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  background: var(--color-bg-surface-2); color: var(--color-text-secondary);
  border: 1px solid var(--color-border-subtle); cursor: pointer;
  font-family: var(--font-mono); font-size: 13px;
}
.date-nav__btn:hover { color: var(--color-text-primary); border-color: var(--color-border-strong); }
.date-nav__today {
  height: 32px; padding: 0 14px;
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
  background: var(--color-bg-surface-2); color: var(--color-text-secondary);
  border: 1px solid var(--color-border-subtle); cursor: pointer;
}
.date-nav__today:hover { color: var(--color-text-primary); border-color: var(--color-border-strong); }
.date-nav__today--active {
  background: var(--color-neutral-strong); color: var(--color-bg-base);
  border-color: var(--color-neutral-strong); font-weight: 600;
}
.date-nav__input {
  height: 32px; padding: 0 10px;
  background: var(--color-bg-surface-2); color: var(--color-text-secondary);
  border: 1px solid var(--color-border-subtle);
  font-family: var(--font-mono); font-size: 12px;
  color-scheme: dark;
}
html.light .date-nav__input { color-scheme: light; }

/* ── Descrições: quebras de linha + Ver mais ── */
.list-row__desc {
  white-space: pre-line;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.list-row__desc--expanded { -webkit-line-clamp: unset; display: block; }
.list-row__desc-wrap { margin: 2px 0 3px; }
.list-row__desc-toggle {
  background: transparent; border: none; padding: 0; margin-top: 2px;
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em;
  color: var(--color-text-tertiary); cursor: pointer; text-transform: uppercase;
}
.list-row__desc-toggle:hover { color: var(--color-text-primary); }
.list--compact .list-row__desc-wrap { display: none; }

/* ── Conclusão por categoria: respiro ── */
.cat-breakdown__grid { gap: 22px 28px; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
.cat-tile { gap: 8px; }
.cat-breakdown__toggle {
  background: transparent; border: 1px solid var(--color-border-subtle);
  color: var(--color-text-tertiary); cursor: pointer;
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 5px 11px;
}
.cat-breakdown__toggle:hover { color: var(--color-text-primary); border-color: var(--color-border-strong); }

/* ── Modal do formulário: hierarquia e respiro ── */
.modal--form { width: 700px; }
.modal--form .modal__body { padding: 26px 30px 30px; }
.modal--form .form-group { margin-bottom: 18px; }
.form-section__title {
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--color-text-quaternary);
  padding-bottom: 8px; margin-bottom: 16px;
  border-bottom: 1px solid var(--color-border-subtle);
}
.form-section__title--gap { margin-top: 26px; }
.modal--form .form-chips { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; }
.modal--form .form-chip { padding: 8px 10px; }
.modal--form .day-chips { gap: 5px; }

/* ── Calendário v2: modos + barra de filtros ── */
.cal-modes { display: flex; gap: 0; border: 1px solid var(--color-border-subtle); }
.cal-mode {
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em;
  padding: 8px 18px; background: var(--color-bg-surface-1);
  color: var(--color-text-tertiary); border: none; cursor: pointer;
  border-right: 1px solid var(--color-border-subtle);
}
.cal-mode:last-child { border-right: none; }
.cal-mode:hover { color: var(--color-text-primary); }
.cal-mode--active { background: var(--color-neutral-strong); color: var(--color-bg-base); font-weight: 600; }

.cal-filterbar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  margin-top: 16px; padding: 12px 14px;
  border: 1px solid var(--color-border-subtle);
  background: var(--color-bg-surface-1);
}
.cal-filterbar__clear {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase;
  background: transparent; color: var(--color-critical);
  border: 1px solid rgba(220, 34, 34, 0.4); padding: 7px 12px; cursor: pointer;
}
.cal-filterbar__clear:hover { background: var(--color-critical-soft); }

/* ── Agenda ── */
.agenda { margin-top: 14px; display: flex; flex-direction: column; gap: 14px; }
.agenda__day { border: 1px solid var(--color-border-subtle); background: var(--color-bg-surface-1); }
.agenda__day-head {
  display: flex; align-items: baseline; justify-content: space-between;
  padding: 11px 18px; border-bottom: 1px solid var(--color-border-subtle);
}
.agenda__day-head--today { box-shadow: inset 2px 0 0 var(--color-neutral-strong); }
.agenda__day-name {
  font-family: var(--font-display); font-size: 12.5px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
}
.agenda__day-count { font-family: var(--font-mono); font-size: 10.5px; color: var(--color-text-quaternary); }

/* ── Semana ── */
.week {
  display: grid; grid-template-columns: repeat(7, minmax(0, 1fr));
  border: 1px solid var(--color-border-subtle); background: var(--color-bg-surface-1);
  margin-top: 14px;
}
.week__col { border-right: 1px solid var(--color-border-subtle); min-height: 300px; min-width: 0; }
.week__col:last-child { border-right: none; }
.week__col--today { background: var(--color-bg-surface-2); box-shadow: inset 0 2px 0 var(--color-neutral-strong); }
.week__col-head {
  display: flex; align-items: baseline; gap: 7px;
  padding: 11px 12px; border-bottom: 1px solid var(--color-border-subtle);
}
.week__col-dow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-text-quaternary); }
.week__col-num { font-family: var(--font-display); font-size: 15px; font-weight: 700; }
.week__col--today .week__col-dow { color: var(--color-text-primary); }
.week__col-list { padding: 8px; display: flex; flex-direction: column; gap: 4px; }
.week__empty { text-align: center; color: var(--color-text-quaternary); font-family: var(--font-mono); font-size: 11px; padding: 14px 0; }

/* ── Timeline ── */
.timeline { margin-top: 18px; position: relative; padding-left: 18px; }
.timeline::before {
  content: ''; position: absolute; left: 3px; top: 8px; bottom: 8px;
  width: 1px; background: var(--color-border-default);
}
.timeline__group { position: relative; margin-bottom: 26px; }
.timeline__marker { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.timeline__dot {
  position: absolute; left: -18px;
  width: 7px; height: 7px; background: var(--color-neutral-mid);
  outline: 3px solid var(--color-bg-base);
}
.timeline__dot--today { background: var(--color-critical); }
.timeline__date {
  font-family: var(--font-display); font-size: 12.5px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
}
.timeline__items { display: flex; flex-direction: column; gap: 5px; }
.timeline__item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 14px; text-align: left;
  background: var(--color-bg-surface-1); border: 1px solid var(--color-border-subtle);
  cursor: pointer; transition: border-color 120ms ease, background 120ms ease;
}
.timeline__item:hover { border-color: var(--color-border-strong); background: var(--color-bg-surface-2); }
.timeline__item-title { font-size: 13px; color: var(--color-text-primary); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.timeline__item--done .timeline__item-title { color: var(--color-text-quaternary); text-decoration: line-through; }

/* ── Respiro geral ── */
.hero { margin-top: 22px; }
.page__header { gap: 16px; flex-wrap: wrap; }
@media (max-width: 1000px) {
  .week { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
  .date-nav { order: 3; width: 100%; }
}

/* ── Seletor de data compacto na linha das abas ── */
.tabs { align-items: center; }
.tabs__date {
  margin-left: auto; display: flex; align-items: center; gap: 4px;
  padding-left: 14px; flex-shrink: 0;
}
.tabs__date .date-nav__btn, .tabs__date .date-nav__today { height: 28px; }
.tabs__date .date-nav__btn { width: 28px; font-size: 12px; }
.tabs__date .date-nav__today { padding: 0 11px; font-size: 10px; }
.tabs__date .date-nav__input { height: 28px; font-size: 11px; padding: 0 8px; }

/* ── Fix: dropdowns da barra de filtros do calendário acima da navegação ── */
.cal-filterbar { position: relative; z-index: 30; }
.cal-nav { position: relative; z-index: 1; }

/* ════ REFINO v0.7 — tipografia e estados de hover ════ */

/* Nitidez: nunca sintetizar negrito e priorizar legibilidade */
body {
  text-rendering: optimizeLegibility;
  font-synthesis: none;
}

/* Syne 700 em tamanhos pequenos fica pesado e "embaçado" — reduzir para 600
   e suavizar o tracking nos títulos de seção */
.view-head__title { font-weight: 600; letter-spacing: 0.05em; }
.cal__month { font-weight: 600; }
.day-panel__title { font-weight: 600; }
.agenda__day-name { font-weight: 600; }
.timeline__date { font-weight: 600; }
.week__col-num { font-weight: 600; }
.team-card__name { font-weight: 600; }
.note__title { font-weight: 600; }

/* Rótulos mono muito pequenos com tracking largo também embaçam — ajuste fino */
.kanban__col-title { font-size: 11px; letter-spacing: 0.1em; }
.report-panel__title { letter-spacing: 0.1em; }
.cat-breakdown__title { letter-spacing: 0.1em; }

/* ── Hover branco sobre botão branco: estados ativos mantêm contraste ── */
.date-nav__today--active:hover {
  color: var(--color-bg-base);
  border-color: var(--color-neutral-strong);
  opacity: 0.88;
}
.cal-mode--active:hover { color: var(--color-bg-base); opacity: 0.88; }
.cal-filter--active:hover {
  color: var(--color-bg-base);
  border-color: var(--color-neutral-strong);
  opacity: 0.88;
}
.day-chip--active:hover {
  color: var(--color-bg-base);
  border-color: var(--color-neutral-strong);
  opacity: 0.88;
}
.form-chip--active:hover {
  color: var(--color-bg-base);
  border-color: var(--color-neutral-strong);
  opacity: 0.92;
}
.cal__nav-btn--strong:hover {
  color: var(--color-bg-base);
  border-color: var(--color-neutral-strong);
  opacity: 0.88;
}

/* ── Guia de configuração (Settings) ── */
.setup-guide {
  border: 1px solid var(--color-border-subtle);
  background: var(--color-bg-surface-2);
  margin-bottom: 18px;
}
.setup-guide__summary {
  cursor: pointer; list-style: none;
  padding: 11px 14px;
  font-family: var(--font-mono); font-size: 11px;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--color-text-secondary);
  display: flex; align-items: center; gap: 8px;
}
.setup-guide__summary::-webkit-details-marker { display: none; }
.setup-guide__summary::before { content: '+'; font-size: 13px; color: var(--color-text-quaternary); }
.setup-guide[open] .setup-guide__summary::before { content: '–'; }
.setup-guide__summary:hover { color: var(--color-text-primary); }
.setup-steps {
  margin: 0; padding: 4px 14px 14px 30px;
  display: flex; flex-direction: column; gap: 10px;
}
.setup-step {
  font-size: 12.5px; line-height: 1.6; color: var(--color-text-secondary);
}
.setup-step b { color: var(--color-text-primary); font-weight: 600; }
.setup-step code {
  font-family: var(--font-mono); font-size: 11px;
  background: var(--color-bg-surface-3);
  padding: 1px 5px; color: var(--color-text-primary);
}
.setup-cols {
  font-family: var(--font-mono); font-size: 10.5px; line-height: 1.7;
  color: var(--color-text-tertiary);
  border: 1px dashed var(--color-border-default);
  padding: 8px 10px; margin: 7px 0;
}

/* ── Topbar: separador e seletor de data ── */
.topbar__sep {
  width: 1px; height: 20px; flex-shrink: 0;
  background: var(--color-border-default);
  margin: 0 4px;
}
.topbar__updated {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--color-text-tertiary); white-space: nowrap;
}
.topbar__date {
  display: flex; align-items: center; gap: 3px; flex-shrink: 0;
}
.topbar__date .date-nav__btn { width: 26px; height: 26px; font-size: 12px; }
.topbar__date .date-nav__today { height: 26px; padding: 0 10px; font-size: 10px; }
.topbar__date .date-nav__input { height: 26px; padding: 0 7px; font-size: 11px; width: 130px; }
/* Ocultar o seletor de data na Topbar nas telas muito estreitas */
@media (max-width: 900px) {
  .topbar__updated { display: none; }
  .topbar__date .date-nav__input { width: 100px; }
}

/* ── Notificações ── */
/* ════ NOTIF PANEL — redesign ════ */
.notif-panel {
  position: absolute;
  top: calc(100% + 10px); right: 0;
  width: 380px;
  background: #0e0e0f;
  border: 1px solid rgba(255,255,255,0.10);
  box-shadow: 0 16px 48px rgba(0,0,0,0.7), 0 0 0 0.5px rgba(255,255,255,0.04) inset;
  z-index: 900;
  display: flex; flex-direction: column;
  max-height: 520px;
  overflow: hidden;
  animation: notifIn 180ms cubic-bezier(0.16, 1, 0.3, 1) both;
}
@keyframes notifIn {
  from { opacity: 0; transform: translateY(-6px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Linha de accent no topo */
.notif-panel::before {
  content: '';
  display: block; height: 2px; flex-shrink: 0;
  background: linear-gradient(90deg, var(--color-critical) 0%, transparent 70%);
}

.notif-panel__head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  flex-shrink: 0;
}
.notif-panel__title {
  font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em;
  text-transform: uppercase; color: rgba(255,255,255,0.5);
  display: flex; align-items: center; gap: 8px;
}
.notif-panel__title strong {
  font-size: 14px; font-family: var(--font-display); font-weight: 700;
  letter-spacing: 0.06em; color: var(--color-text-primary);
}
.notif-panel__mark {
  font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.1em;
  text-transform: uppercase; color: rgba(255,255,255,0.3);
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  padding: 5px 11px; cursor: pointer;
  transition: color 120ms, border-color 120ms;
}
.notif-panel__mark:hover { color: var(--color-text-primary); border-color: rgba(255,255,255,0.3); }

.notif-panel__body { overflow-y: auto; flex: 1; }
.notif-panel__body::-webkit-scrollbar { width: 3px; }
.notif-panel__body::-webkit-scrollbar-track { background: transparent; }
.notif-panel__body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); }

.notif-panel__empty {
  padding: 40px 18px; text-align: center;
  font-family: var(--font-mono); font-size: 11px;
  color: rgba(255,255,255,0.25); line-height: 1.8;
}

/* Grupo: label com linha de separação */
.notif-group__label {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 18px 7px;
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.18em;
  text-transform: uppercase; color: rgba(255,255,255,0.28);
  border-top: 1px solid rgba(255,255,255,0.06);
}
.notif-group__label::after {
  content: ''; flex: 1; height: 1px;
  background: rgba(255,255,255,0.06);
}
.notif-group__label:first-child { border-top: none; }

/* Item */
.notif-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  cursor: pointer; width: 100%; text-align: left;
  background: transparent;
  transition: background 100ms ease;
}
.notif-item:last-child { border-bottom: none; }
.notif-item:hover { background: rgba(255,255,255,0.04); }
.notif-item--unread { background: rgba(255,255,255,0.025); }
.notif-item--unread:hover { background: rgba(255,255,255,0.055); }

/* Accent bar esquerda por tipo */
.notif-item {
  border-left: 2px solid transparent;
  padding-left: 16px;
}
.notif-item[data-type="late"]   { border-left-color: var(--color-critical); }
.notif-item[data-type="today"]  { border-left-color: #e07b00; }
.notif-item[data-type="soon"]   { border-left-color: #5a5a40; }
.notif-item[data-type="critica"]{ border-left-color: #8b2020; }
.notif-item[data-type="rotina"] { border-left-color: rgba(255,255,255,0.2); }

.notif-item__dot {
  width: 6px; height: 6px; flex-shrink: 0;
  background: var(--color-critical);
}
.notif-item__dot--warn { background: #e07b00; }
.notif-item__dot--info { background: rgba(255,255,255,0.3); }

// HELPERS DE STATUS

// em três buckets lógicos para a UI: "aberto", "andamento", "feito".
// ============================================================================

const STATUS_BUCKET = {
  // Projetos
  "Pendente":     "aberto",
  "Em Andamento": "andamento",
  "Pausado":      "aberto",
  "Concluído":    "feito",
  "Cancelado":    "feito",
  // Rotina (já tratado acima)

  "Recebido":     "aberto",
  "Recusado":     "feito",
};

// ── Rotinas recorrentes por dia da semana ──
// Uma rotina com `dias` ("Seg, Ter, Qua") reaparece automaticamente em cada
// dia configurado. Concluir só vale para o dia: `ultimaConclusao` guarda a
// última data concluída; no dia seguinte a rotina volta como pendente sozinha.
const DIAS_SEMANA = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
const splitDias = (s) => String(s || '').split(',').map(x => x.trim()).filter(Boolean);

// Dias efetivos da rotina: os marcados; ou, para rotinas antigas criadas só com
// frequência "Diária" (sem dias), todos os 7 dias — evita o modo legado por status
const diasEfetivos = (item) => {
  if (item.origem !== 'Rotina') return [];
  const d = splitDias(item.dias);
  if (d.length > 0) return d;
  if (/di[áa]ria/i.test(String(item.frequencia || ''))) return [...DIAS_SEMANA];
  return [];
};
const temDias = (item) => diasEfetivos(item).length > 0;
const rotinaNoDia = (item, date) => diasEfetivos(item).includes(DIAS_SEMANA[date.getDay()]);

// Datas 'yyyy-mm-dd' DEVEM ser interpretadas no fuso local (não UTC),
// senão tudo desloca um dia no Brasil (UTC-3)
const parseLocalDate = (v) => {
  if (v instanceof Date) return new Date(v);
  const s = String(v);
  return new Date(/^\d{4}-\d{2}-\d{2}$/.test(s) ? s + 'T12:00:00' : s);
};

// Data de hoje (ou de d) como 'yyyy-mm-dd' no fuso LOCAL
// (toISOString é UTC: à noite no Brasil já devolve o dia seguinte)
const localISO = (d = new Date()) =>
  `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;

const diasAteHoje = (date) => {
  if (!date) return null;
  const d = parseLocalDate(date); d.setHours(0,0,0,0);
  const t = new Date(); t.setHours(0,0,0,0);
  return Math.round((d - t) / (1000 * 60 * 60 * 24));
};

// Conclusões de rotina por DIA: lista de datas 'yyyy-mm-dd' em item.conclusoes.
// Concluir hoje afeta SÓ hoje — cada dia tem seu próprio registro.
const rotinaFeitaNoDia = (item, d) => {
  const iso = localISO(parseLocalDate(d));
  if (Array.isArray(item.conclusoes) && item.conclusoes.includes(iso)) return true;
  // fallback legado (registros antigos em "Última Conclusão")
  if (item.ultimaConclusao) {
    const u = parseLocalDate(item.ultimaConclusao);
    const dd = parseLocalDate(d);
    return u.getFullYear() === dd.getFullYear() && u.getMonth() === dd.getMonth() && u.getDate() === dd.getDate();
  }
  return false;
};

const rotinaFeitaHoje = (item) => rotinaFeitaNoDia(item, new Date());

const isAtivo = (item) => {
  if (temDias(item)) return !rotinaFeitaHoje(item);
  const b = STATUS_BUCKET[item.status];
  return b === "aberto" || b === "andamento";
};

const isFeito = (item) => {
  if (temDias(item)) return rotinaFeitaHoje(item);
  return STATUS_BUCKET[item.status] === "feito" && item.status !== "Cancelado" && item.status !== "Recusado";
};

const isAtrasado = (item) => {
  if (temDias(item)) return false; // rotina recorrente nunca "atrasa": reaparece no próximo dia
  if (!isAtivo(item) || !item.prazo) return false;
  return diasAteHoje(item.prazo) < 0;
};

const isHoje = (item) => {
  if (temDias(item)) return rotinaNoDia(item, new Date()) && isAtivo(item);
  if (!isAtivo(item) || !item.prazo) return false;
  return diasAteHoje(item.prazo) === 0;
};

const isProximos48h = (item) => {
  if (!isAtivo(item) || !item.prazo) return false;
  const d = diasAteHoje(item.prazo);
  return d >= 0 && d <= 2;
};

const isEstaSemana = (item) => {
  if (!isAtivo(item) || !item.prazo) return false;
  const d = diasAteHoje(item.prazo);
  return d >= 0 && d <= 7;
};

const isConcluidoRecente = (item) => {
  if (!isFeito(item)) return false;
  // Considera concluído nos últimos 7 dias (usa prazo como aproximação se não houver concluidoEm)
  if (item.prazo) {
    const d = diasAteHoje(item.prazo);
    return d >= -7 && d <= 0;
  }
  if (item.ultimaConclusao) {
    const d = diasAteHoje(item.ultimaConclusao);
    return d >= -7 && d <= 0;
  }
  return false;
};

  const date = parseLocalDate(d);
  return date.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }).replace('.', '');
};

const formatRelative = (d) => {
  if (!d) return "—";
  const dias = diasAteHoje(d);
  if (dias === 0) return "hoje";
  if (dias === 1) return "amanhã";
  if (dias === -1) return "ontem";
  if (dias > 0 && dias <= 6) return `em ${dias}d`;
  if (dias < 0 && dias >= -6) return `${Math.abs(dias)}d atrás`;
  return formatDate(d);
};

// Multi-categoria: armazenada como string separada por vírgula ("A, B")
const splitCats = (c) => String(c || '').split(',').map(s => s.trim()).filter(Boolean);
