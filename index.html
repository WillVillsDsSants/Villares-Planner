// EQUIPE — solicitantes dos pedidos
// ────────────────────────────────────────────────────────────────────────────
function TeamView({ items }) {
  const pessoas = useMemo(() => {
    const map = new Map();
    items.filter(it => it.origem === 'Pedido' && it.solicitante).forEach(it => {
      const k = it.solicitante.trim();
      if (!map.has(k)) map.set(k, []);
      map.get(k).push(it);
    });
    return [...map.entries()]
      .map(([nome, its]) => ({
        nome,
        total: its.length,
        feitos: its.filter(D.isFeito).length,
        abertos: its.filter(D.isAtivo).length,
      }))
      .sort((a, b) => b.total - a.total);
  }, [items]);

  return (
    <>
      <div className="view-head">
        <div className="view-head__title">Equipe</div>
        <div className="view-head__meta">Solicitantes de pedidos e volume por pessoa</div>
      </div>
      {pessoas.length === 0 ? (
        <div className="empty-view fade-up">
          Nenhum solicitante registrado ainda.<br/>
          Crie pedidos com o campo "Solicitante" preenchido para popular esta visão.
        </div>
      ) : (
        <div className="team-grid">
          {pessoas.map(p => {
            const pct = p.total === 0 ? 0 : (p.feitos / p.total) * 100;
            return (
              <div key={p.nome} className="team-card fade-up">
                <div className="team-card__name">{p.nome}</div>
                <div className="team-card__role">Solicitante</div>
                <div className="team-card__stats">
                  <div>
                    <div className="team-card__stat-num">{p.total}</div>
                    <div className="team-card__stat-label">Pedidos</div>
                  </div>
                  <div>
                    <div className="team-card__stat-num">{p.feitos}</div>
                    <div className="team-card__stat-label">Concluídos</div>
                  </div>
                  <div>
                    <div className="team-card__stat-num">{p.abertos}</div>
                    <div className="team-card__stat-label">Em aberto</div>
                  </div>
                </div>
                <div className="bar">
                  <div className="bar__fill" style={{ width: `${pct}%` }}/>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// API SERVICE — Google Apps Script backend
// ────────────────────────────────────────────────────────────────────────────
function createApi(url, token) {
  if (!url || !token) return null;

  // JSONP: cria <script> tag — único jeito de chamar Apps Script sem CORS
  // Apps Script precisa ter &callback=xxx e retornar: callback({...})
  const requestGet = (action, data) => new Promise((resolve, reject) => {
    const cbName = '__apscb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const timer = setTimeout(() => {
      delete window[cbName];
      script.remove();
      reject(new Error('Timeout: servidor demorou demais'));
    }, 20000);
    window[cbName] = (json) => {
      clearTimeout(timer);
      delete window[cbName];
      script.remove();
      if (!json.ok) reject(new Error(json.error || 'erro desconhecido'));
      else resolve(json);
    };
    const params = new URLSearchParams({ action, token, callback: cbName, ...(data || {}) });
    const script = document.createElement('script');
    script.onerror = () => {
      clearTimeout(timer);
      delete window[cbName];
      reject(new Error('Erro ao carregar script — verifique a URL do Apps Script'));
    };
    script.src = `${url}?${params}`;
    document.head.appendChild(script);
  });

  // POST com text/plain não dispara preflight CORS — Apps Script aceita.
  // Funciona inclusive via file:// (Apps Script responde Access-Control-Allow-Origin: *).
  // Se o XHR falhar mesmo assim (CORS/file://), cai para JSONP via GET com payload.
  const requestPostXhr = (action, data) => new Promise((resolve, reject) => {
    const params = new URLSearchParams({ action, token });
    const xhr = new XMLHttpRequest();
    xhr.open('POST', `${url}?${params}`, true);
    xhr.setRequestHeader('Content-Type', 'text/plain;charset=utf-8');
    xhr.timeout = 20000;
    xhr.onload = () => {
      try {
        const json = JSON.parse(xhr.responseText);
        if (!json.ok) reject(new Error(json.error || 'erro desconhecido'));
        else resolve(json);
      } catch { reject(new Error('Resposta inválida do servidor')); }
    };
    xhr.onerror = () => { const e = new Error(`HTTP ${xhr.status || 'NetworkError'} — verifique a URL`); e.isNetwork = true; reject(e); };
    xhr.ontimeout = () => reject(new Error('Timeout: servidor demorou demais'));
    xhr.send(JSON.stringify(data || {}));
  });

  const requestPost = async (action, data) => {
    try {
      return await requestPostXhr(action, data);
    } catch (err) {
      // Fallback JSONP (sempre funciona em file://): envia o payload como
      // parâmetro GET `payload`. Requer suporte no doGet do Apps Script.
      if (err.isNetwork) {
        return requestGet(action, { payload: JSON.stringify(data || {}) });
      }
      throw err;
    }
  };

  return {
    async ping()        { const r = await requestGet('list');              return r.items; },
    async list()        { const r = await requestGet('list');              return r.items; },
    async create(item)  { const r = await requestPost('create', item);    return r.item; },
    async update(item)  { const r = await requestPost('update', item);    return r.item; },
    async delete(id)    { const r = await requestPost('delete', { id });  return r.id; },
    async bulk(items)   { const r = await requestPost('bulk', { items }); return r.count; },
    async concluir(p)   { const r = await requestPost('concluir', p);     return r; },
  };
}

// ────────────────────────────────────────────────────────────────────────────
// SETTINGS MODAL — configurar Google Sheets API
// ────────────────────────────────────────────────────────────────────────────
// Remove espaços, quebras e caracteres invisíveis (zero-width, BOM, NBSP)
// que vêm junto ao copiar/colar e fazem o token parecer certo sem ser
const cleanCred = (s) => String(s || '').replace(/[\u200B-\u200D\uFEFF\u00A0]/g, '').trim();

function SettingsModal({ open, config, items, onClose, onSave, onUploaded }) {
  const [url, setUrl] = useState(config?.url || '');
  const [token, setToken] = useState(config?.token || '');
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);
  const [uploading, setUploading] = useState(false);

  useEffect(() => {
    if (!open) return;
    setUrl(config?.url || '');
    setToken(config?.token || '');
    setTestResult(null);
  }, [open, config]);

  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open, onClose]);

  if (!open) return null;

  const handleTest = async () => {
    setTesting(true);
    setTestResult(null);
    try {
      const api = createApi(cleanCred(url), cleanCred(token));
      const items = await api.list();
      setTestResult({ ok: true, msg: `Conexão estabelecida. ${items.length} ${items.length === 1 ? 'item encontrado' : 'itens encontrados'} na planilha.` });
    } catch (err) {
      setTestResult({ ok: false, msg: `Falha: ${err.message}` });
    } finally {
      setTesting(false);
    }
  };

  const handleSave = () => {
    if (!cleanCred(url) || !cleanCred(token)) return;
    onSave({ url: cleanCred(url), token: cleanCred(token) });
  };

  const handleDisconnect = () => {
    if (window.confirm('Desconectar do Google Sheets? Os dados continuarão disponíveis localmente.')) {
      onSave(null);
    }
  };

  const handleUpload = async () => {
    if (!url.trim() || !token.trim() || !items || items.length === 0) return;
    if (!window.confirm(`Enviar ${items.length} ${items.length === 1 ? 'item local' : 'itens locais'} para a planilha? Isso substitui o conteúdo atual da aba "Items".`)) return;
    setUploading(true);
    setTestResult(null);
    try {
      const api = createApi(cleanCred(url), cleanCred(token));
      const count = await api.bulk(items);
      setTestResult({ ok: true, msg: `${count} ${count === 1 ? 'item enviado' : 'itens enviados'} para a planilha.` });
      if (onUploaded) onUploaded(); // recarrega o dashboard logo após o envio
    } catch (err) {
      setTestResult({ ok: false, msg: `Falha no envio: ${err.message}` });
    } finally {
      setUploading(false);
    }
  };

  return (
    <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal" style={{ width: 640 }}>
        <header className="modal__header">
          <div className="modal__title">Configurações · Google Sheets</div>
          <button type="button" className="modal__close" onClick={onClose} title="Fechar">
            <X size={16}/>
          </button>
        </header>

        <div className="modal__body">
          <div className="help-block" style={{ marginBottom: 14 }}>
            Conecte uma planilha do Google Sheets como banco de dados.
            Você precisará da <b>URL do Web App</b> (terminada em <code>/exec</code>)
            e do <b>token</b> definido no Apps Script. Primeira vez? Abra o guia abaixo.
          </div>

          <details className="setup-guide">
            <summary className="setup-guide__summary">Como configurar · Passo a passo completo</summary>
            <ol className="setup-steps">
              <li className="setup-step">
                <b>Crie a planilha.</b> Acesse <code>sheets.new</code> e crie uma planilha
                em branco no Google Sheets, com qualquer nome (ex: "Villares Planner").
              </li>
              <li className="setup-step">
                <b>Sobre as colunas.</b> O script cria automaticamente a aba <code>Itens</code> com
                as colunas certas na primeira linha. Se preferir criar manualmente, use exatamente
                estes nomes, nesta ordem:
                <div className="setup-cols">
                  Id · Origem · Título · Descrição · Categoria · Prioridade · Status · Prazo ·
                  Hora · Progresso · Solicitante · Recebido Em · Frequência · Dias da Semana ·
                  Última Conclusão · Criado Em
                </div>
                Não renomeie nem reordene as colunas depois de conectar.
              </li>
              <li className="setup-step">
                <b>Instale o script.</b> Na planilha, vá em <code>Extensões → Apps Script</code>,
                apague o conteúdo do editor e cole o arquivo <code>Code.gs</code> do Planner por inteiro.
              </li>
              <li className="setup-step">
                <b>Defina o token.</b> No topo do script, troque o valor de
                <code> SECRET_TOKEN</code> por uma senha longa e aleatória (mínimo 24 caracteres).
                Guarde esse valor: ele será usado aqui no campo abaixo.
              </li>
              <li className="setup-step">
                <b>Publique o Web App.</b> Clique em <code>Implantar → Nova implantação</code>,
                escolha o tipo <b>App da Web</b> e configure:
                executar como <b>Eu</b> · quem pode acessar: <b>Qualquer pessoa</b>.
                Autorize as permissões e copie a URL terminada em <code>/exec</code>.
              </li>
              <li className="setup-step">
                <b>Conecte.</b> Cole a URL e o token nos campos abaixo, clique em
                <b> Testar conexão</b> e depois em <b>Salvar conexão</b>. Se já houver itens
                locais, use "Enviar itens locais" para subir tudo para a planilha.
              </li>
              <li className="setup-step">
                <b>Atualizou o script depois?</b> Toda mudança no <code>Code.gs</code> exige
                <code> Implantar → Gerenciar implantações → ✎ → Nova versão</code> para entrar no ar.
                A URL permanece a mesma.
              </li>
            </ol>
          </details>

          <div className="form-group">
            <label className="form-group__label">URL do Web App</label>
            <input type="text" className="form-input" value={url}
                   onChange={(e) => setUrl(e.target.value)}
                   placeholder="https://script.google.com/macros/s/.../exec"/>
          </div>

          <div className="form-group">
            <label className="form-group__label">Token de autenticação</label>
            <input type="password" className="form-input" value={token}
                   onChange={(e) => setToken(e.target.value)}
                   placeholder="O mesmo SECRET_TOKEN definido no Apps Script"/>
            <div className="form-group__hint">
              Recomenda-se uma string longa e aleatória (mínimo 24 caracteres).
            </div>
          </div>

          <div style={{ display: 'flex', gap: 10, marginTop: 8, marginBottom: 12 }}>
            <button type="button" className="btn" onClick={handleTest}
                    disabled={testing || !url.trim() || !token.trim()}>
              {testing ? 'Testando…' : 'Testar conexão'}
            </button>
            {items && items.length > 0 && (
              <button type="button" className="btn" onClick={handleUpload}
                      disabled={uploading || !url.trim() || !token.trim()}>
                {uploading ? 'Enviando…' : `Enviar ${items.length} itens locais`}
              </button>
            )}
            {config && (
              <button type="button" className="btn btn--danger" onClick={handleDisconnect}
                      style={{ marginLeft: 'auto' }}>
                Desconectar
              </button>
            )}
          </div>

          {testResult && (
            <div className={`test-result ${testResult.ok ? 'test-result--ok' : 'test-result--err'}`}>
              {testResult.ok ? '✓ ' : '✕ '}{testResult.msg}
            </div>
          )}
          {testResult && !testResult.ok && /token/i.test(testResult.msg) && (
            <div className="help-block" style={{ marginTop: 10 }}>
              <b>"Token inválido" com os dados certos?</b> Em 9 de 10 casos a causa é o deploy
              desatualizado: o Apps Script só passa a usar o novo código/token depois de
              <code> Implantar → Gerenciar implantações → ✎ → Versão: Nova versão → Implantar</code>.
              Salvar o arquivo no editor <b>não</b> atualiza o Web App.
              Confira também: (1) se você criou uma <b>Nova implantação</b> em vez de editar a
              existente, a URL mudou — use a URL mais recente; (2) espaços ou quebra de linha
              no valor do <code>SECRET_TOKEN</code> dentro do script.
            </div>
          )}
        </div>

        <footer className="modal__footer">
          <button type="button" className="btn" onClick={onClose}>Cancelar</button>
          <button type="button" className="btn btn--primary" onClick={handleSave}
                  disabled={!url.trim() || !token.trim()}>
            Salvar conexão
          </button>
        </footer>
      </div>
    </div>
  );
}

// ────────────────────────────────────────────────────────────────────────────
// MAIN APP
// ────────────────────────────────────────────────────────────────────────────
function App() {
  const [theme, toggleTheme] = useTheme();
  const [query, setQuery] = useState('');
  const [activeTab, setActiveTab] = useState('Hoje');
  const [view, setView] = useState('dashboard'); // dashboard | kanban | notas | calendario | relatorios | equipe
  const [selDate, setSelDate] = useState(() => { const d = new Date(); d.setHours(12, 0, 0, 0); return d; });
  const shiftSelDate = (delta) => {
    setSelDate(prev => { const d = new Date(prev); d.setDate(d.getDate() + delta); return d; });
    setActiveTab('Hoje');
  };
  const [filterPrio, setFilterPrio] = useState('Todas');
  const [notifOpen, setNotifOpen] = useState(false);
  const [notifRead, setNotifRead] = useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem('villares_notif_read') || '[]')); }
    catch { return new Set(); }
  });
  const saveRead = (set) => {
    setNotifRead(set);
    try { localStorage.setItem('villares_notif_read', JSON.stringify([...set])); } catch {}
  };
  const [notifDismissed, setNotifDismissed] = useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem('villares_notif_dismissed') || '[]')); }
    catch { return new Set(); }
  });
  const dismissNotif = (id) => {
    const next = new Set([...notifDismissed, id]);
    setNotifDismissed(next);
    try { localStorage.setItem('villares_notif_dismissed', JSON.stringify([...next])); } catch {}
  };
  const [filterCat, setFilterCat] = useState('Todas');
  const [density, setDensity] = useState(() => {
    try { return localStorage.getItem('villares_planner_density') || 'detalhada'; } catch { return 'detalhada'; }
  });
  const toggleDensity = () => setDensity(prev => {
    const next = prev === 'detalhada' ? 'compacta' : 'detalhada';
    try { localStorage.setItem('villares_planner_density', next); } catch {}
    return next;
  });
  const [lastUpdate, setLastUpdate] = useState('agora');

  // ── API config (Google Sheets) ──
  const [apiConfig, setApiConfig] = useState(() => {
    try {
      const saved = localStorage.getItem('villares_planner_api');
      if (saved) {
        const parsed = JSON.parse(saved);
        // Descarta URLs corrompidas (sem https://)
        if (parsed?.url && !parsed.url.startsWith('https://')) return null;
        return parsed;
      }
    } catch {}
    return null;
  });
  useEffect(() => {
    try {
      if (apiConfig) localStorage.setItem('villares_planner_api', JSON.stringify(apiConfig));
      else localStorage.removeItem('villares_planner_api');
    } catch {}
  }, [apiConfig]);

  const api = useMemo(() => apiConfig ? createApi(apiConfig.url, apiConfig.token) : null, [apiConfig]);

  // syncStatus: 'idle' | 'syncing' | 'synced' | 'error' | 'offline'
  const [syncStatus, setSyncStatus] = useState(apiConfig ? 'syncing' : 'offline');
  const [syncError, setSyncError] = useState(null);
  const [settingsOpen, setSettingsOpen] = useState(false);

  // Items: persistido em localStorage como cache; quando API conectada, sincroniza
  const [items, setItems] = useState(() => {
    try {
      const saved = localStorage.getItem('villares_planner_items');
      if (saved) {
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed) && parsed.length > 0) return parsed;
      }
    } catch {}
    return D.MOCK_ITEMS;
  });
  const notifCount = useMemo(() =>
    buildNotifs(items).filter(n => !notifRead.has(n.id) && !notifDismissed.has(n.id)).length
  , [items, notifRead, notifDismissed]);
  useEffect(() => {
    try { localStorage.setItem('villares_planner_items', JSON.stringify(items)); } catch {}
  }, [items]);

  // ── Carrega da API quando configurada / muda ──
  const loadFromApi = async () => {
    if (!api) { setSyncStatus('offline'); return; }
    setSyncStatus('syncing');
    setSyncError(null);
    try {
      const remoteItems = await api.list();
      if (Array.isArray(remoteItems)) {
        setItems(remoteItems);
        setSyncStatus('synced');
        setLastUpdate('agora');
      }
    } catch (err) {
      console.error('Sync error:', err);
      setSyncStatus('error');
      setSyncError(err.message);
    }
  };

  useEffect(() => {
    if (api) loadFromApi();
    else setSyncStatus('offline');
  // eslint-disable-next-line
  }, [api]);

  // Modal item + menu
  const [modalOpen, setModalOpen] = useState(false);
  const [editingItem, setEditingItem] = useState(null);
  const [openMenuId, setOpenMenuId] = useState(null);

  // Click outside fecha menu
  useEffect(() => {
    if (!openMenuId) return;
    const onClick = (e) => {
      if (!e.target.closest('.dropdown')) setOpenMenuId(null);
    };
    const onKey = (e) => { if (e.key === 'Escape') setOpenMenuId(null); };
    const t = setTimeout(() => {
      document.addEventListener('click', onClick);
      document.addEventListener('keydown', onKey);
    }, 0);
    return () => {
      clearTimeout(t);
      document.removeEventListener('click', onClick);
      document.removeEventListener('keydown', onKey);
    };
  }, [openMenuId]);

  const handleNavigate = (v) => setView(v);

  const SYNC_LABELS = {
    'idle':    'Pronto', 'syncing': 'Sincronizando…', 'synced':  'Sincronizado',
    'error':   'Erro de sincronização', 'offline': 'Modo local',
  };
  const SYNC_TITLES = {
    'idle':    'Aguardando', 'syncing': 'Sincronizando com Google Sheets',
    'synced':  'Conectado ao Google Sheets',
    'error':   'Erro ao sincronizar — clique para abrir as configurações',
    'offline': 'Sem conexão com Google Sheets — clique para configurar',
  };

  const handleNew = () => { setEditingItem(null); setModalOpen(true); };
  const handleEdit = (item) => { setEditingItem(item); setModalOpen(true); };
  const handleModalClose = () => { setModalOpen(false); setEditingItem(null); };

  const generateId = (origem) => {
    const prefix = origem === 'Projeto' ? 'P' : origem === 'Rotina' ? 'R' : 'D';
    return `${prefix}-${Date.now().toString(36)}`;
  };

  // Sync funciona em http:// e também em file:// (JSONP + POST text/plain)
  const canSync = () => !!api;

  // Operações: otimistas (atualiza UI primeiro) + sincroniza com API
  const handleModalSave = async (data) => {
    if (editingItem) {
      const merged = { ...editingItem, ...data };
      setItems(prev => prev.map(it => it.id === editingItem.id ? merged : it));
      handleModalClose();
      if (canSync()) {
        setSyncStatus('syncing');
        try {
          await api.update(merged);
          await loadFromApi(); // recarrega da planilha logo após o envio
        } catch (err) {
          setSyncStatus('error'); setSyncError(err.message);
        }
      }
    } else {
      const newItem = { id: generateId(data.origem), ...data };
      setItems(prev => [newItem, ...prev]);
      handleModalClose();
      if (canSync()) {
        setSyncStatus('syncing');
        try {
          await api.create(newItem);
          await loadFromApi(); // recarrega da planilha logo após o envio
        } catch (err) {
          setSyncStatus('error'); setSyncError(err.message);
        }
      }
    }
  };

  // Kanban: mover card de coluna = mudar status (otimista + sync)
  const handleSetStatus = async (item, newStatus) => {
    if (item.status === newStatus) return;
    const updated = { ...item, status: newStatus };
    setItems(prev => prev.map(it => it.id === item.id ? updated : it));
    if (canSync()) {
      setSyncStatus('syncing');
      try { await api.update(updated); await loadFromApi(); }
      catch (err) { setSyncStatus('error'); setSyncError(err.message); }
    }
  };

  // occDate: a data da OCORRÊNCIA sendo marcada (default: hoje).
  // Para rotinas, cada data tem registro próprio — concluir/reabrir
  // afeta exclusivamente aquele dia.
  const handleToggleComplete = async (item, occDate) => {
    const dia = occDate ? new Date(occDate) : new Date();
    if (D.temDias(item)) {
      const iso = D.localISO(dia);
      const feitaNoDia = D.rotinaFeitaNoDia(item, dia);
      const lista = Array.isArray(item.conclusoes) ? item.conclusoes : [];
      const conclusoes = feitaNoDia ? lista.filter(x => x !== iso) : [...lista, iso];
      // legado: só limpa "Última Conclusão" se ela apontar para ESTE dia
      const legadoBate = item.ultimaConclusao &&
        D.localISO(D.parseLocalDate(item.ultimaConclusao)) === iso;
      const updated = { ...item, conclusoes,
        ultimaConclusao: legadoBate ? '' : (item.ultimaConclusao || '') };
      setItems(prev => prev.map(it => it.id === item.id ? updated : it));
      if (canSync()) {
        setSyncStatus('syncing');
        try {
          await api.concluir({ id: item.id, data: iso, done: !feitaNoDia, titulo: item.titulo });
          await loadFromApi();
        } catch (err) {
          setSyncStatus('error');
          setSyncError(/desconhecida/i.test(err.message)
            ? 'Seu Code.gs publicado é antigo e não grava conclusões por dia. Cole o Code.gs mais recente e faça: Implantar → Gerenciar implantações → ✎ → Nova versão. As abas Segunda–Domingo serão criadas sozinhas.'
            : err.message);
        }
      }
      return;
    }
    const isFeito = D.isFeito(item);
    let updated;
    {
      const newStatus = isFeito
        ? (item.origem === 'Pedido' ? 'Recebido' : 'Pendente')
        : 'Concluído';
      updated = { ...item, status: newStatus };
    }
    setItems(prev => prev.map(it => it.id === item.id ? updated : it));
    if (canSync()) {
      setSyncStatus('syncing');
      try { await api.update(updated); await loadFromApi(); }
      catch (err) { setSyncStatus('error'); setSyncError(err.message); }
    }
  };

  const handleDuplicate = async (item) => {
    const copy = {
      ...item,
      id: generateId(item.origem),
      titulo: `${item.titulo} (cópia)`,
      criadoEm: new Date().toISOString().slice(0, 10),
      status: 'Pendente',
    };
    setItems(prev => [copy, ...prev]);
    if (canSync()) {
      setSyncStatus('syncing');
      try { await api.create(copy); await loadFromApi(); }
      catch (err) { setSyncStatus('error'); setSyncError(err.message); }
    }
  };

  const handleDelete = async (item) => {
    if (!window.confirm(`Excluir "${item.titulo}"? Esta ação não pode ser desfeita.`)) return;
    setItems(prev => prev.filter(it => it.id !== item.id));
    if (canSync()) {
      setSyncStatus('syncing');
      try { await api.delete(item.id); await loadFromApi(); }
      catch (err) { setSyncStatus('error'); setSyncError(err.message); }
    }
  };

  const handleSettingsSave = (config) => {
    setApiConfig(config);
    setSettingsOpen(false);
  };

  // Ordenação por header
  const [sortBy, setSortBy] = useState(null);
  const [sortDir, setSortDir] = useState('asc');
  const handleSort = (key) => {
    if (sortBy === key) {
      if (sortDir === 'asc') setSortDir('desc');
      else { setSortBy(null); setSortDir('asc'); }
    } else {
      setSortBy(key);
      setSortDir('asc');
    }
  };

  const today = useMemo(() => {
    return new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' }).replace('.', '');
  }, []);

  // Refresh manual: se tem API, recarrega; senão só atualiza timestamp
  const refresh = () => {
    if (api) loadFromApi();
    else setLastUpdate('agora');
  };

  useEffect(() => {
    let mins = 0;
    const id = setInterval(() => {
      mins += 1;
      setLastUpdate(mins === 1 ? 'há 1 min' : `há ${mins} min`);
    }, 60000);
    return () => clearInterval(id);
  }, [api]);

  // ── filtros ──
  const queryFiltered = useMemo(() => {
    let arr = items;
    if (query.trim()) {
      const q = query.toLowerCase();
      arr = arr.filter(it => {
        const blob = `${it.titulo} ${it.descricao || ''} ${it.categoria} ${it.origem} ${it.prazo || ''} ${it.hora || ''} ${it.dias || ''} ${it.status || ''}`.toLowerCase();
        return blob.includes(q);
      });
    }
    if (filterPrio !== 'Todas') arr = arr.filter(it => it.prioridade === filterPrio);
    if (filterCat !== 'Todas') arr = arr.filter(it => D.hasCat(it, filterCat));
    return arr;
  }, [items, query, filterPrio, filterCat]);

  const viewFiltered = queryFiltered;

  const isTodaySel = D.diasAteHoje(selDate) === 0;

  // ── Estado POR DATA SELECIONADA ──
  // Rotinas recorrentes: ativo/concluído sempre relativo à data escolhida no
  // seletor — mudar a data muda o que cada aba mostra, de forma coerente.
  const ativoNoDia = (it) =>
    D.temDias(it)
      ? (D.rotinaNoDia(it, selDate) && !D.rotinaFeitaNoDia(it, selDate))
      : D.isAtivo(it);
  const feitoNoDia = (it) =>
    D.temDias(it) ? D.rotinaFeitaNoDia(it, selDate) : D.isFeito(it);

  const tabFiltered = useMemo(() => {
    switch (activeTab) {
      case 'Hoje':
        // Hoje real: ativos do dia + atrasados. Outra data: tudo agendado nela.
        return isTodaySel
          ? viewFiltered.filter(it => D.isAtivo(it) && (D.isHoje(it) || D.isAtrasado(it)))
          : occurrencesForDay(viewFiltered, selDate);
      case 'Todos':     return viewFiltered.filter(ativoNoDia);
      case 'Projeto':   return viewFiltered.filter(it => it.origem === 'Projeto' && D.isAtivo(it));
      // Rotina: TODAS as rotinas (visão de gestão); o status mostrado é o do dia selecionado
      case 'Rotina':    return viewFiltered.filter(it => it.origem === 'Rotina');
      case 'Pedido':    return viewFiltered.filter(it => it.origem === 'Pedido'  && D.isAtivo(it));
      case 'Atrasados': return viewFiltered.filter(D.isAtrasado);
      case 'Concluidos': return viewFiltered.filter(feitoNoDia);
      default: return viewFiltered;
    }
  }, [viewFiltered, activeTab, selDate]);

  const tabCounts = useMemo(() => ({
    Hoje:       isTodaySel
                  ? viewFiltered.filter(it => D.isAtivo(it) && (D.isHoje(it) || D.isAtrasado(it))).length
                  : occurrencesForDay(viewFiltered, selDate).length,
    Todos:      viewFiltered.filter(ativoNoDia).length,
    Projeto:    viewFiltered.filter(it => it.origem === 'Projeto' && D.isAtivo(it)).length,
    Rotina:     viewFiltered.filter(it => it.origem === 'Rotina').length,
    Pedido:     viewFiltered.filter(it => it.origem === 'Pedido'  && D.isAtivo(it)).length,
    Atrasados:  viewFiltered.filter(D.isAtrasado).length,
    Concluidos: viewFiltered.filter(feitoNoDia).length,
  }), [viewFiltered, selDate]);

  // ── ordenação: por urgência (default) ou por coluna selecionada ──
  const rank = (it) => {
    if (D.isAtrasado(it)) return 0;
    if (D.isHoje(it)) return 1;
    if (D.isProximos48h(it)) return 2;
    if (D.isEstaSemana(it)) return 3;
    return 4;
  };
  const prioRank = { 'Crítica': 0, Alta: 1, 'Média': 2, Baixa: 3 };
  const statusRank = { 'Bloqueado': 0, 'Pausado': 1, 'Em Andamento': 2, 'Pendente': 3, 'Recebido': 4, 'Concluído': 5, 'Recusado': 6, 'Cancelado': 7 };

  const sorted = useMemo(() => {
    const arr = [...tabFiltered];
    if (!sortBy) {
      // Default: urgência
      return arr.sort((a, b) => {
        const ra = rank(a), rb = rank(b);
        if (ra !== rb) return ra - rb;
        if (a.prazo && b.prazo) return new Date(a.prazo) - new Date(b.prazo);
        if (a.prazo) return -1;
        if (b.prazo) return 1;
        return 0;
      });
    }
    const dir = sortDir === 'asc' ? 1 : -1;
    arr.sort((a, b) => {
      let av, bv;
      switch (sortBy) {
        case 'titulo':
          av = (a.titulo || '').toLowerCase();
          bv = (b.titulo || '').toLowerCase();
          break;
        case 'categoria':
          av = (a.categoria || '').toLowerCase();
          bv = (b.categoria || '').toLowerCase();
          break;
        case 'prioridade':
          av = prioRank[a.prioridade] ?? 99;
          bv = prioRank[b.prioridade] ?? 99;
          break;
        case 'criadoEm':
          av = a.criadoEm ? new Date(a.criadoEm).getTime() : 0;
          bv = b.criadoEm ? new Date(b.criadoEm).getTime() : 0;
          break;
        case 'prazo':
          av = a.prazo ? new Date(a.prazo).getTime() : Number.POSITIVE_INFINITY;
          bv = b.prazo ? new Date(b.prazo).getTime() : Number.POSITIVE_INFINITY;
          break;
        case 'status':
          av = statusRank[a.status] ?? 99;
          bv = statusRank[b.status] ?? 99;
          break;
        default:
          return 0;
      }
      if (av < bv) return -1 * dir;
      if (av > bv) return 1 * dir;
      return 0;
    });
    return arr;
  }, [tabFiltered, sortBy, sortDir]);

  // ── métricas globais (sobre TODOS os items, não só do tab) ──
  const metrics = useMemo(() => {
    const ativos    = items.filter(D.isAtivo);
    const feitos    = items.filter(D.isFeito);
    const atrasados = items.filter(D.isAtrasado);
    const hoje      = items.filter(D.isHoje);
    const andamento = items.filter(it => D.STATUS_BUCKET[it.status] === 'andamento');
    const total     = ativos.length + feitos.length;
    const pct       = total === 0 ? 0 : (feitos.length / total) * 100;
    return { ativos, feitos, atrasados, hoje, andamento, total, pct };
  }, [items]);

  // ── aside ──
  const upcoming = useMemo(() =>
    items.filter(it => D.isAtivo(it) && it.prazo && D.diasAteHoje(it.prazo) <= 7)
         .sort((a,b) => new Date(a.prazo) - new Date(b.prazo))
         .slice(0, 6)
  , [items]);

  const allCats = useMemo(() =>
    D.CATEGORIAS.map(cat => {
      const cs = items.filter(it => D.hasCat(it, cat));
      const feitos = cs.filter(D.isFeito).length;
      const total = cs.length;
      return { nome: cat, feitos, total, pct: total === 0 ? 0 : (feitos / total) * 100 };
    }).filter(r => r.total > 0).sort((a, b) => b.total - a.total)
  , [items]);

  return (
    <div className="app">
      <div className="ambience"/>
      <Sidebar theme={theme} view={view} onNavigate={handleNavigate}
               onToggleTheme={toggleTheme} onOpenSettings={() => setSettingsOpen(true)}/>

      <div className="main">
        <Topbar query={query} onQueryChange={setQuery} onNew={handleNew}
                syncStatus={syncStatus} syncLabels={SYNC_LABELS} syncTitles={SYNC_TITLES}
                lastUpdate={lastUpdate} onRefresh={refresh}
                onOpenSettings={() => setSettingsOpen(true)}
                selDate={selDate}
                onDateShift={shiftSelDate}
                onDateToday={() => { const d = new Date(); d.setHours(12,0,0,0); setSelDate(d); }}
                onDateSet={(d) => { setSelDate(d); setActiveTab('Hoje'); }}
                notifOpen={notifOpen} setNotifOpen={setNotifOpen}
                notifCount={notifCount} items={items} notifRead={notifRead}
                saveRead={saveRead} handleEdit={handleEdit}
                notifDismissed={notifDismissed} dismissNotif={dismissNotif}/>

        <div className="page">
          <PageHeader today={today}/>

          {syncStatus === 'error' && syncError && (
            <div className="banner banner--error">
              <Warning size={16} className="banner__icon"/>
              <div className="banner__body">
                <div className="banner__title">Erro de sincronização com Google Sheets</div>
                <div className="banner__text">
                  {syncError.includes('403')
                    ? 'Acesso negado (403). No Apps Script, republique o deploy com "Who has access: Anyone" (sem exigir login Google).'
                    : syncError.includes('NetworkError') || syncError.includes('network')
                    ? 'Sem conexão com o servidor. Verifique a URL do Apps Script nas configurações.'
                    : `${syncError}. Os dados continuam disponíveis localmente.`}
                </div>
              </div>
              <button className="banner__action" onClick={() => setSettingsOpen(true)}>
                Abrir configurações
              </button>
              <button className="banner__close" onClick={() => setSyncError(null)} title="Fechar">
                <X size={14}/>
              </button>
            </div>
          )}

          {!apiConfig && (
            <div className="banner">
              <Layers size={16} className="banner__icon"/>
              <div className="banner__body">
                <div className="banner__title">Modo local</div>
                <div className="banner__text">
                  Os dados estão salvos apenas no navegador. Conecte uma planilha Google Sheets para sincronizar com a equipe.
                </div>
              </div>
              <button className="banner__action" onClick={() => setSettingsOpen(true)}>
                Configurar Google Sheets
              </button>
            </div>
          )}

          {/* HERO: 4 KPI tiles em linha + faixa de conclusão geral abaixo */}
          {view === 'dashboard' && (<>
          <section className="hero">
            <KPI label="Concluídos"  value={metrics.feitos.length}
                 sub={`${Math.round(metrics.pct)}% de taxa de conclusão`}
                 icon={Check} variant="positive"/>
            <KPI label="Em andamento"  value={metrics.andamento.length}
                 sub={`De ${metrics.ativos.length} Ativos`} icon={Loader} variant="info"/>
            <KPI label="Vencimentos hoje"  value={metrics.hoje.length}
                 sub={metrics.hoje.length === 0 ? 'Nenhum vencimento hoje' : 'Concluir no dia'}
                 icon={Clock} variant="warning"/>
            <KPI label="Atrasados"  value={metrics.atrasados.length}
                 sub={metrics.atrasados.length === 0 ? 'Sem atrasos' : 'Requer atenção'}
                 icon={Warning}
                 variant={metrics.atrasados.length > 0 ? "negative" : ""}/>
          </section>
          <section className="hero-bottom">
            <Conclusion
              pct={metrics.pct}
              feitos={metrics.feitos.length}
              ativos={metrics.ativos.length}
              total={metrics.total}
              categorias={allCats}
              rotinasHoje={items.filter(it => D.temDias(it) && D.rotinaNoDia(it, new Date())).length}
            />
          </section>
          </>)}

          {view === 'dashboard' && (<>
          {/* Tabs estilo ML */}
          <Tabs active={activeTab} onChange={setActiveTab} counts={tabCounts}
                selDate={selDate}/>

          {/* Toolbar */}
          <Toolbar count={sorted.length}
                   sortBy={sortBy}
                   onSortSelect={(key) => { setSortBy(key); setSortDir('asc'); }}
                   prio={filterPrio} onPrio={setFilterPrio}
                   cat={filterCat} onCat={setFilterCat}
                   density={density} onToggleDensity={toggleDensity}/>

          {/* List header + list */}
          <ListHeader sortBy={sortBy} sortDir={sortDir} onSort={handleSort}/>
          {sorted.length === 0 ? (
            <div className="list-empty">
              {activeTab === 'Hoje'
                ? 'Nada para hoje. Aproveite para adiantar o que está vindo nos próximos dias.'
                : 'Nenhum item nesta visualização'}
            </div>
          ) : (
            <div className={`list ${density === 'compacta' ? 'list--compact' : ''}`}>
              {sorted.map(item => (
                <ListRow key={item.id} item={item}
                         occDate={selDate}
                         menuOpen={openMenuId === item.id}
                         onMenuToggle={(id) => setOpenMenuId(prev => prev === id ? null : id)}
                         onEdit={handleEdit}
                         onToggleComplete={handleToggleComplete}
                         onDuplicate={handleDuplicate}
                         onDelete={handleDelete}/>
              ))}
            </div>
          )}

          </>)}

          {/* Aside grid — só no dashboard */}
          {view === 'dashboard' && (
            <div className="aside-grid">
              <UpcomingPanel items={upcoming}/>
              <CategoriesPanel data={allCats}/>
            </div>
          )}

          {view === 'kanban' && (
            <KanbanView items={queryFiltered} onEdit={handleEdit} onSetStatus={handleSetStatus}
                        onToggle={handleToggleComplete}/>
          )}
          {view === 'notas' && <NotesView/>}
          {view === 'calendario' && <CalendarView items={queryFiltered} onEdit={handleEdit}/>}
          {view === 'relatorios' && <ReportsView items={items} allCats={allCats} metrics={metrics}/>}
          {view === 'equipe' && <TeamView items={items}/>}

          <footer className="footer">
            <span>Villares · Planner v1.6</span>
            <span>
              {items.length} {items.length === 1 ? 'Item total' : 'Itens totais'} · {Math.round(metrics.pct)}% de taxa de conclusão{view === 'dashboard' ? ` · Aba ativa: ${activeTab}` : ''}
            </span>
          </footer>
        </div>
      </div>

      <ItemModal
        open={modalOpen}
        item={editingItem}
        onClose={handleModalClose}
        onSave={handleModalSave}
      />

      <SettingsModal
        open={settingsOpen}
        config={apiConfig}
        items={items}
        onClose={() => setSettingsOpen(false)}
        onSave={handleSettingsSave}
        onUploaded={loadFromApi}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
